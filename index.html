<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Soccer Coach</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; height: 100vh; height: 100dvh; width: 100vw; }

/* Main Layout */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; width: 100vw; }

/* Home Screen */
#home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #1a1a2e; }
#home-screen.hidden { display: none; }
#home-title { font-size: 24px; font-weight: 800; color: #e94560; letter-spacing: 1px; text-align: center; }
#home-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.home-card { width: 140px; height: 120px; background: #16213e; border: 2px solid #0f3460; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; user-select: none; transition: transform .1s, border-color .15s; }
.home-card:active { transform: scale(.95); }
.home-card:hover { border-color: #1a5276; }
.home-card .home-icon { font-size: 32px; }
.home-card .home-label { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: .5px; }

/* Nav buttons - fixed top right */
#nav-buttons { position: fixed; top: 4px; right: 4px; z-index: 100; display: none; gap: 4px; }
#nav-buttons.visible { display: flex; }
#nav-buttons button { background: rgba(15,52,96,.85); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 4px; padding: 3px 8px; font-size: 14px; cursor: pointer; user-select: none; line-height: 1; }
#nav-buttons button:active { opacity: .7; }

/* Modes */
#game-mode, #practice-mode { width: 100%; flex: 1; min-height: 0; display: none; flex-direction: column; }
#game-mode.active, #practice-mode.active { display: flex; }
#main-area { display: grid; grid-template-columns: 1fr 110px; grid-template-rows: 1fr auto; flex: 1; min-height: 0; }
#field-container { grid-column: 1; grid-row: 1; position: relative; padding: 8px; min-width: 0; display: flex; flex-direction: column; }
#sidebar { grid-column: 2; grid-row: 1; background: #16213e; display: flex; flex-direction: column; padding: 28px 6px 6px; gap: 4px; border-left: 2px solid #0f3460; overflow: hidden; min-width: 0; max-width: 110px; }
#bench-bar { grid-column: 1 / -1; grid-row: 2; background: #16213e; border-top: 2px solid #0f3460; padding: 6px 10px; display: flex; align-items: center; gap: 8px; overflow-x: auto; min-height: 46px; }

/* Field */
#field { flex: 1; background: #2d8a4e; border-radius: 8px; position: relative; border: 3px solid #fff; overflow: hidden; min-height: 0; transition: border-color .2s; }
#field.swap-mode { border-color: #f39c12; }
#field-inner { width: 100%; height: 100%; position: relative; }
#field-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
#field-positions { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

/* Swap lines SVG overlay */
#swap-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 8; pointer-events: none; }

/* Flip button centered on midfield line */
#flip-btn { position: absolute; top: 4px; left: 50%; transform: translateX(-50%); z-index: 15; background: rgba(15,52,96,.85); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; user-select: none; }
#flip-btn:active { opacity: .7; }
/* Quarter buttons flanking FLIP on field */
#quarter-left, #quarter-right { position: absolute; top: 4px; z-index: 15; display: flex; gap: 3px; }
#quarter-left { right: calc(50% + 40px); }
#quarter-right { left: calc(50% + 40px); }

/* Player dots on field */
.field-player { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; user-select: none; }
.field-player .dot { width: 26px; height: 26px; border-radius: 50%; background: #e94560; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.5); box-shadow: 0 2px 6px rgba(0,0,0,.4); transition: box-shadow .15s, border-color .15s; }
.field-player.selected .dot { border-color: #fff; box-shadow: 0 0 0 4px rgba(255,255,255,.6), 0 0 12px rgba(255,255,255,.4); }
.field-player.swap-planned .dot { border-color: #f39c12; box-shadow: 0 0 0 3px rgba(243,156,18,.5); }
.field-player.swap-pick .dot { border-color: #f39c12; box-shadow: 0 0 0 4px rgba(243,156,18,.7), 0 0 14px rgba(243,156,18,.4); }
.field-player .player-name { font-size: 13px; font-weight: 600; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.8); margin-top: 2px; white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }

/* Bench players */
.bench-player { background: #e94560; color: #fff; padding: 4px 10px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 2px solid transparent; user-select: none; flex-shrink: 0; transition: border-color .15s, box-shadow .15s; }
.bench-player.selected { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,.6); }
.bench-player.swap-planned { border-color: #f39c12; box-shadow: 0 0 6px rgba(243,156,18,.5); }
.bench-player.swap-pick { border-color: #f39c12; box-shadow: 0 0 8px rgba(243,156,18,.7); }
.bench-player.absent { background: #555; text-decoration: line-through; opacity: .5; }
#bench-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }

/* Sidebar */
.quarter-btn { background: rgba(15,52,96,.85); color: #aaa; border: 1px solid rgba(255,255,255,.3); border-radius: 4px; padding: 3px 6px; font-size: 10px; font-weight: 700; cursor: pointer; text-align: center; }
.quarter-btn.active { background: rgba(26,82,118,.9); color: #fff; border-color: #0f0; }
#timer-display { font-size: 26px; font-weight: 700; text-align: center; font-variant-numeric: tabular-nums; padding: 2px 0; color: #0f0; }
#timer-display.warning { color: #ff0; }
#timer-display.urgent { color: #f00; animation: blink .5s infinite; }
@keyframes blink { 50% { opacity: .4; } }
#preset-buttons { display: flex; flex-wrap: wrap; gap: 3px; }
.preset-btn { flex: 1; min-width: 46px; background: #0f3460; color: #fff; border: 2px solid #1a5276; border-radius: 5px; padding: 4px 2px; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
.preset-btn.active { border-color: #0f0; background: #1a5276; }
.sidebar-btn { background: #533483; color: #fff; border: none; border-radius: 5px; padding: 6px 4px; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
.sidebar-btn:active { opacity: .7; }
#start-btn { background: #0a0; }
#start-btn.running { background: #c50; }
#reset-btn { background: #555; }
#settings-btn { background: #333; }
#nextq-btn { background: #8e44ad; }
#plan-btn { background: #2c3e50; font-size: 10px; }
#plan-btn.loaded { background: #27ae60; }
#swap-btn { background: #e67e22; }
#swap-btn.active { background: #d35400; box-shadow: 0 0 8px rgba(243,156,18,.6); }

/* Quarter preview mode */
#preview-banner { display: none; position: absolute; top: 0; left: 0; right: 0; z-index: 20; background: rgba(142,68,173,.92); text-align: center; padding: 4px 0; font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 1px; }
#preview-banner.active { display: block; }
#preview-actions { display: none; position: absolute; bottom: 8px; left: 8px; right: 8px; z-index: 20; gap: 8px; justify-content: center; }
#preview-actions.active { display: flex; }
#preview-actions button { flex: 1; padding: 10px 8px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; color: #fff; }
#preview-apply { background: #27ae60; }
#preview-back { background: #555; }
.quarter-btn.previewing { background: rgba(142,68,173,.85); color: #fff; border-color: #8e44ad; animation: qpulse 1.2s infinite; }
@keyframes qpulse { 50% { border-color: #fff; } }

/* Normal sidebar content */
#sidebar-normal { display: flex; flex-direction: column; gap: 4px; flex: 1; }
#sidebar-swap { display: none; flex-direction: column; gap: 4px; flex: 1; }
.sb-group { display: flex; flex-direction: column; gap: 4px; }
#sidebar-swap.active { display: flex; }
#sidebar-normal.hidden { display: none; }
#swap-header { font-size: 11px; font-weight: 700; color: #f39c12; text-align: center; text-transform: uppercase; letter-spacing: 1px; padding: 2px 0; }
.swap-pair { font-size: 10px; color: #fff; background: #3d2200; border-radius: 4px; padding: 3px 4px; text-align: center; margin-bottom: 2px; cursor: pointer; }
.swap-pair:active { opacity: .6; }
#swap-pairs-list { flex: 1; overflow-y: auto; min-height: 0; }
.swap-exec-btn { background: #27ae60; color: #fff; border: none; border-radius: 5px; padding: 6px 4px; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
.swap-save-btn { background: #2980b9; color: #fff; border: none; border-radius: 5px; padding: 6px 4px; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
.swap-clear-btn { background: #555; color: #fff; border: none; border-radius: 5px; padding: 6px 4px; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
#swap-presets-select { background: #0f3460; color: #fff; border: 1px solid #1a5276; border-radius: 4px; padding: 4px; font-size: 11px; font-weight: 600; width: 100%; cursor: pointer; }

/* Settings Modal */
#settings-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,.7); z-index: 100; justify-content: center; align-items: center; }
#settings-overlay.open { display: flex; }
#settings-panel { background: #1a1a2e; border: 2px solid #0f3460; border-radius: 12px; width: 92vw; max-width: 600px; max-height: 88vh; overflow-y: auto; padding: 16px; }
#settings-panel h2 { font-size: 18px; margin-bottom: 10px; color: #e94560; }
#settings-panel h3 { font-size: 13px; margin: 12px 0 6px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
.setting-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.setting-row input, .setting-row select { background: #16213e; border: 1px solid #0f3460; color: #fff; padding: 5px 6px; border-radius: 5px; font-size: 13px; }
.setting-row input[type="text"] { flex: 1; min-width: 80px; }
.setting-row input[type="number"] { width: 50px; text-align: center; }
.remove-btn { background: #c0392b; color: #fff; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px; }
.add-btn { background: #27ae60; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600; }
#close-settings { background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 8px 20px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 12px; }

/* Position label on empty spots */
.empty-position { position: absolute; transform: translate(-50%, -50%); text-align: center; cursor: pointer; z-index: 5; user-select: none; }
.empty-position .dot { width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,.15); border: 2px dashed rgba(255,255,255,.4); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.empty-position .pos-label { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px; font-weight: 600; }

/* Subs overlay */
#subs-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,.7); z-index: 90; justify-content: center; align-items: center; }
#subs-overlay.open { display: flex; }
#subs-panel { background: #1a1a2e; border: 2px solid #8e44ad; border-radius: 12px; padding: 16px; min-width: 220px; max-width: 350px; }
#subs-panel h3 { margin-bottom: 10px; color: #8e44ad; font-size: 15px; }
.sub-line { background: #16213e; color: #fff; border-radius: 6px; padding: 8px 12px; margin-bottom: 5px; font-size: 14px; text-align: left; font-weight: 600; }
.sub-line .sub-pos { display: inline-block; width: 28px; color: #aaa; font-size: 12px; }
.sub-line .arrow { color: #f1c40f; }
#subs-apply { background: #27ae60; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; margin-top: 8px; }
#subs-cancel { background: #555; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; width: 100%; margin-top: 5px; }

/* Game plan editor */
.gp-quarter { background: #16213e; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
.gp-quarter h4 { font-size: 12px; color: #8e44ad; margin-bottom: 6px; }
.gp-pos-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
.gp-pos-row label { width: 28px; font-size: 11px; font-weight: 700; color: #aaa; }
.gp-pos-row select { flex: 1; background: #0f1a30; border: 1px solid #0f3460; color: #fff; padding: 3px 4px; border-radius: 4px; font-size: 12px; }
.gp-swaps { font-size: 11px; color: #8e44ad; padding: 4px 8px; margin-bottom: 6px; }
/* Plan editor - single grid with quarter tabs */
.gp-qtabs { display: flex; gap: 4px; margin-bottom: 8px; }
.gp-qtab { flex: 1; background: #0f3460; color: #aaa; border: none; border-radius: 6px; padding: 7px 4px; cursor: pointer; font-size: 13px; font-weight: 700; text-align: center; }
.gp-qtab.active { background: #8e44ad; color: #fff; }
.gp-field { position: relative; background: #0a1628; border-radius: 8px; padding: 10px 6px; margin-bottom: 6px; }
.gp-field-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.gp-field-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 2px; margin-top: 8px; }
.gp-field-label:first-child { margin-top: 0; }
.gp-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 2px; border-radius: 8px; cursor: pointer; transition: background 0.15s, box-shadow 0.15s; user-select: none; }
.gp-cell:active { background: rgba(255,255,255,0.05); }
.gp-cell.gp-swap-selected { background: rgba(231,76,60,0.25); box-shadow: 0 0 0 2px #e74c3c; }
.gp-cell.gp-changed { box-shadow: 0 0 0 2px #f39c12; }
.gp-cell .gp-pos-label { font-size: 10px; font-weight: 700; color: #8e44ad; }
.gp-cell .gp-player-name { font-size: 12px; color: #fff; font-weight: 600; text-align: center; min-height: 16px; }
.gp-cell .gp-player-name.empty { color: #555; font-weight: 400; }
.gp-bench-area { margin-top: 8px; padding-top: 8px; border-top: 1px solid #1a3050; }
.gp-bench-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 4px; }
.gp-bench-grid { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.gp-bench-chip { background: #0f1a30; border: 1px solid #0f3460; color: #ccc; padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; user-select: none; transition: background 0.15s, box-shadow 0.15s; }
.gp-bench-chip:active { background: rgba(255,255,255,0.05); }
.gp-bench-chip.gp-swap-selected { background: rgba(231,76,60,0.25); box-shadow: 0 0 0 2px #e74c3c; }
.gp-swap-hint { font-size: 10px; color: #666; text-align: center; margin-top: 6px; font-style: italic; }
.gp-swap-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
.gp-cell.gp-in-midswap { box-shadow: 0 0 0 1px rgba(243,156,18,0.4); background: rgba(243,156,18,0.08); }
.gp-diff-summary { font-size: 11px; color: #f39c12; background: rgba(243,156,18,0.1); padding: 6px 8px; border-radius: 6px; margin-bottom: 6px; text-align: center; }
.gp-name-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
.gp-name-row input { flex: 1; }
.gp-btn { padding: 6px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; color: #fff; }
.gp-save { background: #27ae60; }
.gp-load { background: #2980b9; }
.gp-delete { background: #c0392b; }
.settings-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.settings-tab { flex: 1; background: #0f3460; color: #aaa; border: none; border-radius: 6px; padding: 8px; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; }
.settings-tab.active { background: #1a5276; color: #fff; }
.settings-section { display: none; }
.settings-section.active { display: block; }

/* Timer flash */
#timer-flash { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200; pointer-events: none; }
#timer-flash.flashing { display: block; animation: screenFlash 0.4s ease-in-out 4; }
@keyframes screenFlash { 0%,100% { background: transparent; } 50% { background: rgba(255,0,0,.45); } }

/* Save swap prompt */
#save-swap-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,.7); z-index: 95; justify-content: center; align-items: center; }
#save-swap-overlay.open { display: flex; }
#save-swap-panel { background: #1a1a2e; border: 2px solid #e67e22; border-radius: 12px; padding: 16px; min-width: 220px; }
#save-swap-panel h3 { margin-bottom: 10px; color: #e67e22; font-size: 15px; }
#save-swap-name { background: #16213e; border: 1px solid #0f3460; color: #fff; padding: 8px; border-radius: 6px; font-size: 14px; width: 100%; margin-bottom: 8px; }
#save-swap-confirm { background: #27ae60; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; }
#save-swap-cancel { background: #555; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; width: 100%; margin-top: 5px; }

/* ========== PRACTICE MODE ========== */
#pm-topbar { display: flex; align-items: center; gap: 6px; padding: 6px 75px 6px 10px; background: #16213e; border-bottom: 2px solid #0f3460; min-height: 40px; }
#pm-topbar .pm-title { flex: 1; font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#pm-topbar button { background: #0f3460; color: #fff; border: 1px solid #1a5276; border-radius: 4px; padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
#pm-topbar button:active { opacity: .7; }

#pm-field-container { flex: 1; position: relative; padding: 6px; min-height: 0; display: flex; flex-direction: column; }
#pm-field { flex: 1; background: #2d8a4e; border-radius: 8px; position: relative; border: 2px solid #0f3460; overflow: hidden; min-height: 0; }
#pm-field-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
#pm-draw-layer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }

/* Practice objects */
.pm-obj { cursor: pointer; user-select: none; }
.pm-obj.selected { filter: drop-shadow(0 0 4px #f1c40f) drop-shadow(0 0 8px #f1c40f); }
.pm-player-circle { fill: #e94560; stroke: #fff; stroke-width: 16; }
.pm-player-label { fill: #fff; font-size: 80px; font-weight: 700; font-family: sans-serif; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.pm-cone { fill: #f39c12; stroke: #e67e22; stroke-width: 8; }
.pm-ball-circle { fill: #fff; stroke: #333; stroke-width: 8; }
.pm-coach-body { fill: #2ecc71; stroke: #fff; stroke-width: 2; }
.pm-coach-head { fill: #2ecc71; stroke: #fff; stroke-width: 2; }
.pm-coach-label { fill: #fff; font-size: 20px; font-weight: 700; font-family: sans-serif; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.pm-ball-pattern { fill: #333; }

/* Step & tool bars */
#pm-step-bar { display: flex; align-items: center; gap: 4px; padding: 6px 10px; background: #16213e; border-top: 2px solid #0f3460; min-height: 38px; overflow-x: auto; }
.pm-step-btn { background: #0f3460; color: #aaa; border: 1px solid #1a5276; border-radius: 4px; padding: 5px 10px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.pm-step-btn.active { background: #1a5276; color: #fff; border-color: #0f0; }
.pm-step-btn.add { color: #27ae60; font-size: 16px; padding: 3px 10px; }

#pm-toolbar { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 6px 10px; background: #1a1a2e; border-top: 2px solid #0f3460; min-height: 42px; }
.pm-tool-btn { width: 42px; height: 38px; background: #0f3460; color: #fff; border: 2px solid #1a5276; border-radius: 6px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.pm-tool-btn.active { border-color: #f1c40f; background: #1a5276; box-shadow: 0 0 6px rgba(241,196,15,.4); }
.pm-tool-btn:active { opacity: .7; }

/* Practice tabs */
#pm-tabs { display: flex; background: #1a1a2e; border-top: 2px solid #0f3460; }
.pm-tab { flex: 1; background: #0f3460; color: #aaa; border: none; padding: 10px; font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; letter-spacing: .5px; }
.pm-tab.active { background: #1a5276; color: #fff; }
.pm-tab:active { opacity: .7; }

/* Practice views */
.pm-view { display: none; flex: 1; flex-direction: column; min-height: 0; overflow: hidden; }
.pm-view.active { display: flex; }

/* Library view */
#pm-library { padding: 10px; overflow-y: auto; }
#pm-library-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-right: 75px; }
#pm-library-header h3 { font-size: 16px; color: #e94560; }
.pm-drill-card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
.pm-drill-card:active { opacity: .8; }
.pm-drill-card h4 { font-size: 14px; color: #fff; margin-bottom: 4px; }
.pm-drill-card .pm-drill-meta { font-size: 11px; color: #aaa; }
.pm-drill-card .pm-drill-actions { display: flex; gap: 6px; margin-top: 6px; }
.pm-drill-card .pm-drill-actions button { background: #0f3460; color: #fff; border: 1px solid #1a5276; border-radius: 4px; padding: 3px 8px; font-size: 10px; cursor: pointer; }

/* Session view */
#pm-session { padding: 10px; overflow-y: auto; }
.pm-session-item { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.pm-session-item .pm-si-name { flex: 1; font-size: 13px; font-weight: 600; }
.pm-session-item input[type="number"] { width: 45px; background: #0f1a30; border: 1px solid #0f3460; color: #fff; border-radius: 4px; padding: 3px; font-size: 12px; text-align: center; }
.pm-session-item button { background: #0f3460; color: #fff; border: 1px solid #1a5276; border-radius: 4px; padding: 3px 6px; font-size: 14px; cursor: pointer; }
#pm-session-total { font-size: 13px; color: #aaa; text-align: center; padding: 8px; font-weight: 600; }
#pm-run-bar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: #16213e; border-top: 2px solid #0f3460; }
#pm-run-bar .pm-run-info { flex: 1; font-size: 13px; font-weight: 600; }
#pm-run-timer { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: #0f0; }
#pm-run-bar button { background: #533483; color: #fff; border: none; border-radius: 5px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

/* ========== PORTRAIT MODE ========== */
@media (orientation: portrait) {
  #main-area { display: flex; flex-direction: column; flex: none; }
  #field-container { order: 1; flex: none; height: 45vh; padding: 4px; }
  #bench-bar { order: 2; }
  #sidebar { order: 3; }
  /* Show only our half of the field */
  #field-inner { width: 200%; }
  #field-inner.flipped { transform: translateX(-50%); }
  #flip-btn { font-size: 10px; padding: 2px 8px; }

  #sidebar { width: 100%; max-width: none; flex: none; flex-direction: row; border-left: none; border-top: 2px solid #0f3460; padding: 0; overflow: visible; }
  #sidebar-normal { flex-direction: row; flex-wrap: nowrap; align-items: stretch; gap: 0; }
  #sidebar-swap { flex-direction: row; flex-wrap: wrap; gap: 4px; align-items: center; justify-content: center; padding: 6px 8px; }

  /* Portrait groups: 3 equal columns with dividers */
  .sb-group { flex: 1; flex-direction: column; align-items: stretch; justify-content: center; gap: 5px; padding: 6px 8px; border-right: 1px solid #1a3a6a; }
  .sb-group:last-child { border-right: none; }
  #sb-spacer { display: none; }

  /* Time group: big timer, hide presets (set before game via settings) */
  #timer-display { font-size: 26px; padding: 0; text-align: center; }
  #preset-buttons { display: none; }

  /* Control buttons: fill group width, compact */
  .sidebar-btn { padding: 6px 4px; font-size: 12px; text-align: center; }

  #quarter-left, #quarter-right { gap: 2px; }
  .quarter-btn { padding: 6px 8px; font-size: 12px; }
  #swap-header { padding: 4px 8px; }
  .swap-pair { font-size: 11px; padding: 4px 8px; }
  .swap-exec-btn, .swap-save-btn, .swap-clear-btn { padding: 7px 6px; font-size: 12px; }
  #swap-pairs-list { display: flex; gap: 4px; flex-wrap: wrap; overflow-y: visible; }
  #swap-presets-select { font-size: 12px; width: auto; }

  #bench-bar { min-height: 42px; padding: 4px 8px; }
}

<script>
// --- Firebase Setup ---
const firebaseConfig = {
  apiKey: "AIzaSyAtxDB1eLiUMDX2_NjAwkBI7djfbJIYf_s",
  authDomain: "coach-assistant-b367d.firebaseapp.com",
  databaseURL: "https://coach-assistant-b367d-default-rtdb.firebaseio.com",
  projectId: "coach-assistant-b367d",
  storageBucket: "coach-assistant-b367d.firebasestorage.app",
  messagingSenderId: "98665714749",
  appId: "1:98665714749:web:0111d59677c4ffc9410654"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dbRef = db.ref('gameState');
let firebaseReady = false;
let firebaseIgnoreCount = 0;

const POSITIONS = ['G','LD','RD','LW','RW','M'];
const DEFAULT_PRESETS = [
  { min: 10, sec: 0 },
  { min: 4, sec: 30 },
  { min: 5, sec: 0 }
];
const POS_COORDS_NORMAL = {
  G:   { x: 6,  y: 50 },
  LD:  { x: 28, y: 32 },
  RD:  { x: 28, y: 68 },
  LW:  { x: 46, y: 25 },
  RW:  { x: 46, y: 75 },
  M:   { x: 46, y: 50 }
};
const DEFAULT_ROSTER = ['Emma','Corissa','Eliza','Avery','Lotte','Everlee','Charlotte','Bianca','Maebh','Callie','Cora','Gigi'];

let flipped = false;
let state = loadState();
let timerInterval = null, timerRunning = false, timerSeconds = 0, timerCountUp = false, selectedPreset = -1;
let selectedPlayer = null, currentQuarter = 0, pendingSubs = null, editingPlanIdx = -1;
let swapMode = false, plannedSwaps = [], swapFirstPick = null;

function defaultState() {
  return {
    players: DEFAULT_ROSTER.map(n => ({ name: n, position: '' })),
    presets: DEFAULT_PRESETS.map(p => ({...p})),
    assignments: {}, absent: [], gamePlans: [], activeGamePlan: null, swapPresets: []
  };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('soccer-coach-state'));
    if (s && s.players) {
      if (!s.gamePlans) s.gamePlans = [];
      if (!s.absent) s.absent = [];
      if (s.activeGamePlan === undefined) s.activeGamePlan = null;
      if (!s.swapPresets) s.swapPresets = [];
      const migrated = {};
      Object.keys(s.assignments || {}).forEach(k => {
        const nk = k === 'GK' ? 'G' : k === 'Mid' ? 'M' : k;
        migrated[nk] = s.assignments[k];
      });
      s.assignments = migrated;
      return s;
    }
  } catch(e) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem('soccer-coach-state', JSON.stringify(state));
  // Sync to Firebase
  firebaseIgnoreCount++;
  dbRef.set(state).catch(e => console.warn('Firebase save error:', e));
}

// Listen for remote changes from Firebase
dbRef.on('value', (snapshot) => {
  if (firebaseIgnoreCount > 0) { firebaseIgnoreCount--; return; }
  const data = snapshot.val();
  if (data && data.players) {
    state = data;
    if (!state.gamePlans) state.gamePlans = [];
    if (!state.absent) state.absent = [];
    if (!state.swapPresets) state.swapPresets = [];
    if (!state.assignments) state.assignments = {};
    if (state.activeGamePlan === undefined) state.activeGamePlan = null;
    localStorage.setItem('soccer-coach-state', JSON.stringify(state));
    if (firebaseReady) render();
  }
});
firebaseReady = true;

function getPosCoords(pos) {
  const c = POS_COORDS_NORMAL[pos];
  if (!flipped) return c;
  return { x: 100 - c.x, y: 100 - c.y };
}

// --- Swap Planning Mode ---
function toggleSwapMode() {
  if (previewQuarter !== null) return; // don't allow swap during preview

  swapMode = !swapMode;
  swapFirstPick = null; selectedPlayer = null;
  if (!swapMode) plannedSwaps = [];
  else loadPlanSwapsForCurrentQuarter();
  updateSwapModeUI(); render();
}

function loadPlanSwapsForCurrentQuarter() {
  if (state.activeGamePlan === null) return;
  const plan = state.gamePlans[state.activeGamePlan];
  if (!plan || !plan.quarters) return;
  const qk = 'Q' + (currentQuarter + 1);
  const qd = plan.quarters[qk];
  if (!qd || !qd._swaps || !qd._swaps.length) return;
  plannedSwaps = [];
  qd._swaps.forEach(s => {
    if (s.a && s.b) {
      plannedSwaps.push({ a: { ...s.a }, b: { ...s.b } });
    }
  });
}

function updateSwapModeUI() {
  document.getElementById('sidebar-normal').classList.toggle('hidden', swapMode);
  document.getElementById('sidebar-swap').classList.toggle('active', swapMode);
  document.getElementById('swap-btn').classList.toggle('active', swapMode);
  document.getElementById('field').classList.toggle('swap-mode', swapMode);
  if (swapMode) renderSwapSidebar();
}

function renderSwapSidebar() {
  const sel = document.getElementById('swap-presets-select');
  sel.innerHTML = '<option value="">— Saved —</option>';
  state.swapPresets.forEach((preset, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = preset.name;
    sel.appendChild(opt);
  });
  if (state.swapPresets.length > 0) {
    const delOpt = document.createElement('option');
    delOpt.value = '__manage__';
    delOpt.textContent = '✕ Delete a preset…';
    sel.appendChild(delOpt);
  }
  sel.value = '';
  const pairsDiv = document.getElementById('swap-pairs-list');
  pairsDiv.innerHTML = '';
  plannedSwaps.forEach((swap, i) => {
    const div = document.createElement('div');
    div.className = 'swap-pair';
    div.textContent = describeSwapPair(swap);
    div.onclick = () => removeSwapPair(i);
    pairsDiv.appendChild(div);
  });
}

function onSwapPresetSelect(sel) {
  const val = sel.value;
  if (val === '') return;
  if (val === '__manage__') {
    // Switch to delete mode: show presets with ✕ prefix
    sel.innerHTML = '<option value="">— Cancel —</option>';
    state.swapPresets.forEach((p, i) => {
      const opt = document.createElement('option');
      opt.value = '__del__' + i;
      opt.textContent = '✕ ' + p.name;
      sel.appendChild(opt);
    });
    sel.value = '';
    return;
  }
  if (val.startsWith('__del__')) {
    deleteSwapPreset(parseInt(val.replace('__del__', '')));
    return;
  }
  loadSwapPreset(parseInt(val));
  sel.value = '';
}

function describeSwapPair(swap) { return getSwapPickName(swap.a) + ' ↔ ' + getSwapPickName(swap.b); }

function getSwapPickName(pick) {
  if (pick.type === 'field') {
    const idx = state.assignments[pick.key];
    const name = (idx !== undefined && state.players[idx]) ? state.players[idx].name : '?';
    return name + ' (' + pick.key + ')';
  }
  return state.players[pick.key] ? state.players[pick.key].name + ' (bench)' : '?';
}

function isInPlannedSwap(type, key) {
  return plannedSwaps.some(s => (s.a.type === type && s.a.key === key) || (s.b.type === type && s.b.key === key));
}

function onSwapModeTap(type, key) {
  const existingIdx = plannedSwaps.findIndex(s => (s.a.type === type && s.a.key === key) || (s.b.type === type && s.b.key === key));
  if (existingIdx >= 0) { removeSwapPair(existingIdx); return; }
  if (!swapFirstPick) { swapFirstPick = { type, key }; render(); renderSwapSidebar(); return; }
  if (swapFirstPick.type === 'bench' && type === 'bench') { swapFirstPick = { type, key }; render(); renderSwapSidebar(); return; }
  if (swapFirstPick.type === type && swapFirstPick.key === key) { swapFirstPick = null; render(); renderSwapSidebar(); return; }
  plannedSwaps.push({ a: swapFirstPick, b: { type, key } });
  swapFirstPick = null; render(); renderSwapSidebar();
}

function removeSwapPair(i) { plannedSwaps.splice(i, 1); render(); renderSwapSidebar(); }
function clearSwapPlan() { plannedSwaps = []; swapFirstPick = null; render(); renderSwapSidebar(); }

function executeSwaps() {
  if (plannedSwaps.length === 0) return;
  plannedSwaps.forEach(swap => doSwapDirect(swap.a, swap.b));
  plannedSwaps = []; swapFirstPick = null;
  swapMode = false;
  updateSwapModeUI();
  saveState(); render();
}

function doSwapDirect(sel1, sel2) {
  if (sel1.type === 'field' && sel2.type === 'field') {
    const tmp = state.assignments[sel1.key]; state.assignments[sel1.key] = state.assignments[sel2.key]; state.assignments[sel2.key] = tmp;
  } else if (sel1.type === 'field' && sel2.type === 'bench') {
    state.assignments[sel1.key] = sel2.key;
  } else if (sel1.type === 'bench' && sel2.type === 'field') {
    state.assignments[sel2.key] = sel1.key;
  }
}

function loadSwapPreset(idx) {
  const preset = state.swapPresets[idx]; if (!preset) return;
  plannedSwaps = []; swapFirstPick = null;
  preset.pairs.forEach(pair => {
    const a = parseSavedPick(pair[0]), b = parseSavedPick(pair[1]);
    if (a && b) plannedSwaps.push({ a, b });
  });
  render(); renderSwapSidebar();
}

function parseSavedPick(s) {
  if (typeof s === 'string' && s.startsWith('bench:')) { const idx = parseInt(s.slice(6)); if (!isNaN(idx) && state.players[idx]) return { type: 'bench', key: idx }; return null; }
  if (POSITIONS.includes(s)) return { type: 'field', key: s }; return null;
}
function serializePick(pick) { return pick.type === 'field' ? pick.key : 'bench:' + pick.key; }

function promptSaveSwap() {
  if (plannedSwaps.length === 0) return;
  document.getElementById('save-swap-name').value = '';
  document.getElementById('save-swap-overlay').classList.add('open');
  document.getElementById('save-swap-name').focus();
}
function confirmSaveSwap() {
  const name = document.getElementById('save-swap-name').value.trim() || 'Swap ' + (state.swapPresets.length + 1);
  state.swapPresets.push({ name, pairs: plannedSwaps.map(s => [serializePick(s.a), serializePick(s.b)]) });
  saveState(); closeSaveSwap(); renderSwapSidebar();
}
function closeSaveSwap() { document.getElementById('save-swap-overlay').classList.remove('open'); }
function deleteSwapPreset(idx) { state.swapPresets.splice(idx, 1); saveState(); renderSwapSidebar(); }

// --- Swap Lines on Field ---
function renderSwapLines() {
  const svg = document.getElementById('swap-lines');
  svg.innerHTML = '';
  if (!swapMode) return;

  plannedSwaps.forEach(swap => {
    if (swap.a.type === 'field' && swap.b.type === 'field') {
      const ca = getPosCoords(swap.a.key), cb = getPosCoords(swap.b.key);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', ca.x); line.setAttribute('y1', ca.y);
      line.setAttribute('x2', cb.x); line.setAttribute('y2', cb.y);
      line.setAttribute('stroke', 'rgba(243,156,18,.6)');
      line.setAttribute('stroke-width', '0.5');
      line.setAttribute('stroke-dasharray', '1.5,1');
      svg.appendChild(line);
    }
  });

  // Draw line from first pick to... nothing yet, just highlight
  if (swapFirstPick && swapFirstPick.type === 'field') {
    const c = getPosCoords(swapFirstPick.key);
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', c.x); circle.setAttribute('cy', c.y); circle.setAttribute('r', '2');
    circle.setAttribute('fill', 'none'); circle.setAttribute('stroke', 'rgba(243,156,18,.8)'); circle.setAttribute('stroke-width', '0.4');
    svg.appendChild(circle);
  }
}

// --- Selection (normal mode) ---
function clearSelection() { selectedPlayer = null; render(); }

function onFieldBackgroundClick(e) {
  if (previewQuarter !== null) return; // no interaction during preview
  if (e.target.closest('.field-player') || e.target.closest('.empty-position') || e.target.closest('#flip-btn')) return;
  if (swapMode) { swapFirstPick = null; render(); renderSwapSidebar(); return; }
  clearSelection();
}

function selectFieldPlayer(pos) {
  if (previewQuarter !== null) return;
  if (swapMode) { onSwapModeTap('field', pos); return; }
  if (selectedPlayer && selectedPlayer.type === 'field' && selectedPlayer.key === pos) { clearSelection(); return; }
  if (selectedPlayer) { doSwap(selectedPlayer, { type: 'field', key: pos }); return; }
  selectedPlayer = { type: 'field', key: pos }; render();
}

function selectBenchPlayer(idx) {
  if (previewQuarter !== null) return;
  if (swapMode) { onSwapModeTap('bench', idx); return; }
  if (state.absent && state.absent.includes(idx)) { toggleAbsent(idx); return; }
  if (selectedPlayer && selectedPlayer.type === 'bench' && selectedPlayer.key === idx) { clearSelection(); return; }
  if (selectedPlayer) { doSwap(selectedPlayer, { type: 'bench', key: idx }); return; }
  selectedPlayer = { type: 'bench', key: idx }; render();
}

function selectEmptyPosition(pos) {
  if (swapMode) return;
  if (selectedPlayer) {
    if (selectedPlayer.type === 'bench') { state.assignments[pos] = selectedPlayer.key; saveState(); }
    else if (selectedPlayer.type === 'field') {
      const playerIdx = state.assignments[selectedPlayer.key];
      delete state.assignments[selectedPlayer.key]; state.assignments[pos] = playerIdx; saveState();
    }
    selectedPlayer = null; render();
  }
}

function doSwap(sel1, sel2) { doSwapDirect(sel1, sel2); selectedPlayer = null; saveState(); render(); }

// --- Render ---
function render() {
  renderField(); renderBench(); renderPresets(); renderQuarters(); renderPlanButton(); renderSwapLines();
  // Portrait half-field
  document.getElementById('field-inner').classList.toggle('flipped', flipped);
}

function renderField() {
  const container = document.getElementById('field-positions');
  container.innerHTML = '';
  POSITIONS.forEach(pos => {
    const coords = getPosCoords(pos);
    const playerIdx = state.assignments[pos];
    const hasPlayer = playerIdx !== undefined && playerIdx !== null && state.players[playerIdx];
    if (hasPlayer) {
      const player = state.players[playerIdx];
      const el = document.createElement('div'); el.className = 'field-player';
      if (!swapMode && selectedPlayer && selectedPlayer.type === 'field' && selectedPlayer.key === pos) el.classList.add('selected');
      if (swapMode) {
        if (swapFirstPick && swapFirstPick.type === 'field' && swapFirstPick.key === pos) el.classList.add('swap-pick');
        else if (isInPlannedSwap('field', pos)) el.classList.add('swap-planned');
      }
      el.style.left = coords.x + '%'; el.style.top = coords.y + '%';
      el.innerHTML = `<div class="dot">${pos}</div><div class="player-name">${escHtml(player.name)}</div>`;
      el.onclick = (e) => { e.stopPropagation(); selectFieldPlayer(pos); };
      container.appendChild(el);
    } else {
      const el = document.createElement('div'); el.className = 'empty-position';
      el.style.left = coords.x + '%'; el.style.top = coords.y + '%';
      el.innerHTML = `<div class="dot"></div><div class="pos-label">${pos}</div>`;
      el.onclick = (e) => { e.stopPropagation(); selectEmptyPosition(pos); };
      container.appendChild(el);
    }
  });
}

function renderBench() {
  const bar = document.getElementById('bench-bar');
  bar.innerHTML = '<span id="bench-label">BENCH</span>';
  state.players.forEach((player, idx) => {
    if (Object.values(state.assignments).includes(idx)) return;
    const el = document.createElement('div'); el.className = 'bench-player';
    if (state.absent && state.absent.includes(idx)) el.classList.add('absent');
    if (!swapMode && selectedPlayer && selectedPlayer.type === 'bench' && selectedPlayer.key === idx) el.classList.add('selected');
    if (swapMode) {
      if (swapFirstPick && swapFirstPick.type === 'bench' && swapFirstPick.key === idx) el.classList.add('swap-pick');
      else if (isInPlannedSwap('bench', idx)) el.classList.add('swap-planned');
    }
    el.textContent = player.name;
    el.onclick = () => selectBenchPlayer(idx);
    let holdTimer;
    el.ontouchstart = () => { holdTimer = setTimeout(() => { toggleAbsent(idx); holdTimer = null; }, 500); };
    el.ontouchend = () => { if (holdTimer) clearTimeout(holdTimer); };
    el.ontouchmove = () => { if (holdTimer) clearTimeout(holdTimer); };
    el.oncontextmenu = (e) => { e.preventDefault(); toggleAbsent(idx); };
    bar.appendChild(el);
  });
}

function renderPresets() {
  const c = document.getElementById('preset-buttons'); c.innerHTML = '';
  state.presets.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (selectedPreset === i ? ' active' : '');
    btn.textContent = formatTime(p.min * 60 + p.sec); btn.onclick = () => selectPreset(i); c.appendChild(btn);
  });
  const sw = document.createElement('button');
  sw.className = 'preset-btn' + (selectedPreset === -2 ? ' active' : '');
  sw.textContent = '⏱'; sw.onclick = () => selectStopwatch(); c.appendChild(sw);
}

function renderQuarters() {
  const left = document.getElementById('quarter-left');
  const right = document.getElementById('quarter-right');
  left.innerHTML = ''; right.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const btn = document.createElement('button');
    let cls = 'quarter-btn';
    if (previewQuarter === i) cls += ' previewing';
    else if (currentQuarter === i && previewQuarter === null) cls += ' active';
    btn.className = cls;
    btn.textContent = 'Q' + (i + 1); btn.onclick = () => setQuarter(i);
    (i < 2 ? left : right).appendChild(btn);
  }
}

function renderPlanButton() {
  const btn = document.getElementById('plan-btn');
  if (state.activeGamePlan !== null && state.gamePlans[state.activeGamePlan]) {
    btn.textContent = state.gamePlans[state.activeGamePlan].name; btn.classList.add('loaded');
  } else { btn.textContent = 'NO PLAN'; btn.classList.remove('loaded'); }
}

// --- Quarter ---
let previewQuarter = null;  // null = not previewing, 0-3 = previewing that quarter
let savedAssignments = null; // real assignments saved during preview

function setQuarter(q) {
  if (swapMode) return; // don't allow quarter switch during swap mode

  // If we're previewing and tap the same quarter again, ignore (use Apply/Back buttons)
  if (previewQuarter === q) return;

  // If we're previewing a different quarter, switch preview
  if (previewQuarter !== null) {
    previewQuarter = q;
    showPreview(q);
    return;
  }

  // If tapping the currently active quarter, do nothing
  if (q === currentQuarter) return;

  // If there's an active plan, go to preview mode
  if (state.activeGamePlan !== null && state.gamePlans[state.activeGamePlan]) {
    const plan = state.gamePlans[state.activeGamePlan];
    const lineup = plan.quarters['Q' + (q + 1)];
    if (lineup) {
      enterPreview(q);
      return;
    }
  }

  // No plan - just switch quarter label
  currentQuarter = q; renderQuarters();
}

function enterPreview(q) {
  savedAssignments = JSON.parse(JSON.stringify(state.assignments));
  previewQuarter = q;
  showPreview(q);
}

function showPreview(q) {
  const plan = state.gamePlans[state.activeGamePlan];
  const lineup = plan.quarters['Q' + (q + 1)];
  if (!lineup) return;

  // Temporarily apply lineup to field for visual preview
  state.assignments = {};
  POSITIONS.forEach(pos => { if (lineup[pos] != null && lineup[pos] !== '') state.assignments[pos] = lineup[pos]; });

  document.getElementById('preview-banner').textContent = `Q${q + 1} PREVIEW`;
  document.getElementById('preview-banner').classList.add('active');
  document.getElementById('preview-actions').classList.add('active');
  document.getElementById('field').style.borderColor = '#8e44ad';
  render();
}

function exitPreview() {
  if (savedAssignments) {
    state.assignments = savedAssignments;
    savedAssignments = null;
  }
  previewQuarter = null;
  document.getElementById('preview-banner').classList.remove('active');
  document.getElementById('preview-actions').classList.remove('active');
  document.getElementById('field').style.borderColor = '';
  render();
}

function applyPreview() {
  if (previewQuarter === null) return;
  currentQuarter = previewQuarter;
  savedAssignments = null; // discard - we're keeping the preview lineup
  previewQuarter = null;
  document.getElementById('preview-banner').classList.remove('active');
  document.getElementById('preview-actions').classList.remove('active');
  document.getElementById('field').style.borderColor = '';
  saveState(); render();
}

function nextQuarter() {
  const nextQ = Math.min(currentQuarter + 1, 3); if (nextQ === currentQuarter) return;
  setQuarter(nextQ);
}

function showPendingSubs(nextQ, nextLineup) {
  document.getElementById('subs-title').textContent = `Q${nextQ + 1} Lineup`;
  const list = document.getElementById('subs-list'); list.innerHTML = '';
  // Find who's on the field now vs next
  const curOnField = new Set(Object.values(state.assignments).filter(v => v != null));
  const nextOnField = new Set(Object.values(nextLineup).filter(v => v != null));
  // Show full next-quarter lineup: position → player, highlight bench players coming in
  POSITIONS.forEach(pos => {
    const pIdx = nextLineup[pos];
    const name = (pIdx != null && state.players[pIdx]) ? state.players[pIdx].name : '—';
    const comingFromBench = pIdx != null && !curOnField.has(pIdx);
    const d = document.createElement('div');
    d.className = 'sub-line';
    d.innerHTML = `<span class="sub-pos">${pos}</span> ${escHtml(name)}` + (comingFromBench ? ' <span class="arrow">⬆ IN</span>' : '');
    if (comingFromBench) d.style.background = '#1a3a1a';
    list.appendChild(d);
  });
  // Show who's going to bench
  const goingOut = [];
  curOnField.forEach(idx => { if (!nextOnField.has(idx) && state.players[idx]) goingOut.push(state.players[idx].name); });
  if (goingOut.length) {
    const d = document.createElement('div');
    d.className = 'sub-line';
    d.style.background = '#3a1a1a';
    d.innerHTML = '<span class="sub-pos">OUT</span> ' + goingOut.map(n => escHtml(n)).join(', ');
    list.appendChild(d);
  }
  pendingSubs = { nextQ, nextLineup }; document.getElementById('subs-overlay').classList.add('open');
}

function computeSwaps(cur, next) {
  const lines = [], changes = [];
  POSITIONS.forEach(pos => { if (cur[pos] !== next[pos]) changes.push({ pos, from: cur[pos], to: next[pos] }); });
  if (!changes.length) return [];
  const described = new Set();
  changes.forEach(ch => {
    if (described.has(ch.pos)) return;
    const fn = ch.from != null && state.players[ch.from] ? state.players[ch.from].name : null;
    const tn = ch.to != null && state.players[ch.to] ? state.players[ch.to].name : null;
    const rev = changes.find(c => c.from === ch.to && c.to === ch.from && c.pos !== ch.pos);
    if (rev && !described.has(rev.pos)) {
      lines.push(`${fn||'Empty'} (${ch.pos}) <span class="arrow">↔</span> ${tn||'Empty'} (${rev.pos})`);
      described.add(ch.pos); described.add(rev.pos);
    } else {
      if (tn) lines.push(`${tn} <span class="arrow">→</span> ${ch.pos}` + (fn ? ` (${fn} out)` : ''));
      else if (fn) lines.push(`${fn} <span class="arrow">→</span> Bench`);
      described.add(ch.pos);
    }
  });
  return lines;
}

function applySubs() { if (!pendingSubs) return; currentQuarter = pendingSubs.nextQ; applyLineup(pendingSubs.nextLineup); closeSubs(); saveState(); render(); }
function applyLineup(lineup) {
  state.assignments = {};
  POSITIONS.forEach(pos => { if (lineup[pos] != null && lineup[pos] !== '') state.assignments[pos] = lineup[pos]; });
}
function closeSubs() { pendingSubs = null; document.getElementById('subs-overlay').classList.remove('open'); }

// --- Game Plan cycling ---
function cyclePlan() {
  if (!state.gamePlans.length) { openSettings(); switchSettingsTab('plans'); return; }
  if (state.activeGamePlan === null) loadGamePlanByIdx(0);
  else { const n = state.activeGamePlan + 1; if (n >= state.gamePlans.length) { state.activeGamePlan = null; saveState(); render(); } else loadGamePlanByIdx(n); }
}
function loadGamePlanByIdx(idx) {
  // Exit preview if active
  if (previewQuarter !== null) { previewQuarter = null; savedAssignments = null; document.getElementById('preview-banner').classList.remove('active'); document.getElementById('preview-actions').classList.remove('active'); document.getElementById('field').style.borderColor = ''; }
  state.activeGamePlan = idx; currentQuarter = 0;
  const plan = state.gamePlans[idx];
  if (plan && plan.quarters && plan.quarters.Q1) applyLineup(plan.quarters.Q1);
  saveState(); render();
}

// --- Timer ---
function selectPreset(i) { if (timerRunning) return; selectedPreset = i; timerCountUp = false; timerSeconds = state.presets[i].min * 60 + state.presets[i].sec; updateTimerDisplay(); renderPresets(); }
function selectStopwatch() { if (timerRunning) return; selectedPreset = -2; timerCountUp = true; timerSeconds = 0; updateTimerDisplay(); renderPresets(); }

function toggleTimer() {
  if (timerRunning) { clearInterval(timerInterval); timerRunning = false; document.getElementById('start-btn').textContent = 'START'; document.getElementById('start-btn').classList.remove('running'); }
  else {
    if (!timerCountUp && timerSeconds <= 0) return;
    timerRunning = true; document.getElementById('start-btn').textContent = 'PAUSE'; document.getElementById('start-btn').classList.add('running');
    timerInterval = setInterval(() => {
      if (timerCountUp) timerSeconds++; else timerSeconds--;
      updateTimerDisplay();
      if (!timerCountUp && timerSeconds <= 0) { clearInterval(timerInterval); timerRunning = false; document.getElementById('start-btn').textContent = 'START'; document.getElementById('start-btn').classList.remove('running'); timerAlert(); }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerRunning = false; document.getElementById('start-btn').textContent = 'START'; document.getElementById('start-btn').classList.remove('running');
  timerSeconds = timerCountUp ? 0 : (selectedPreset >= 0 ? state.presets[selectedPreset].min * 60 + state.presets[selectedPreset].sec : 0);
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display'); el.textContent = formatTime(timerSeconds); el.className = '';
  if (!timerCountUp && timerRunning && timerSeconds <= 10) el.className = 'urgent';
  else if (!timerCountUp && timerRunning && timerSeconds <= 30) el.className = 'warning';
}

function formatTime(s) { return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'); }

function timerAlert() {
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200, 100, 200]);
  try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); for (let i = 0; i < 4; i++) { const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.value = 0.4; o.start(ctx.currentTime + i * 0.35); o.stop(ctx.currentTime + i * 0.35 + 0.2); } } catch(e) {}
  const flash = document.getElementById('timer-flash'); flash.classList.remove('flashing'); void flash.offsetWidth; flash.classList.add('flashing');
  flash.addEventListener('animationend', () => flash.classList.remove('flashing'), { once: true });
}

// --- Flip ---
function flipSides() { flipped = !flipped; document.getElementById('flip-btn').textContent = flipped ? '◀ ⇄ FLIP' : '⇄ FLIP'; render(); }

// --- Fullscreen ---
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// --- Absent ---
function toggleAbsent(idx) {
  const i = state.absent.indexOf(idx);
  if (i >= 0) state.absent.splice(i, 1);
  else { state.absent.push(idx); Object.keys(state.assignments).forEach(pos => { if (state.assignments[pos] === idx) delete state.assignments[pos]; }); }
  if (selectedPlayer && selectedPlayer.type === 'bench' && selectedPlayer.key === idx) selectedPlayer = null;
  saveState(); render();
}

// --- Settings ---
function openSettings() { renderSettingsPanel(); document.getElementById('settings-overlay').classList.add('open'); }
function closeSettings() { saveSettings(); document.getElementById('settings-overlay').classList.remove('open'); if (appMode === 'game') render(); }

function switchSettingsTab(tab) {
  document.querySelectorAll('.settings-tab').forEach((t, i) => t.classList.toggle('active', (tab === 'general' && i === 0) || (tab === 'plans' && i === 1)));
  document.getElementById('tab-general').classList.toggle('active', tab === 'general');
  document.getElementById('tab-plans').classList.toggle('active', tab === 'plans');
  if (tab === 'plans') renderGamePlansUI();
}

function renderSettingsPanel() {
  const td = document.getElementById('timer-settings'); td.innerHTML = '';
  state.presets.forEach((p, i) => { const r = document.createElement('div'); r.className = 'setting-row'; r.innerHTML = `<span>Preset ${i + 1}:</span><input type="number" min="0" max="99" value="${p.min}" data-preset="${i}" data-field="min" style="width:50px"> min <input type="number" min="0" max="59" value="${p.sec}" data-preset="${i}" data-field="sec" style="width:50px"> sec`; td.appendChild(r); });
  const rd = document.getElementById('roster-settings'); rd.innerHTML = '';
  state.players.forEach((p, i) => { const r = document.createElement('div'); r.className = 'setting-row'; r.innerHTML = `<input type="text" value="${escAttr(p.name)}" data-player="${i}" data-field="name" placeholder="Name"><select data-player="${i}" data-field="position"><option value="">Any</option>${POSITIONS.map(pos => `<option value="${pos}" ${p.position === pos ? 'selected' : ''}>${pos}</option>`).join('')}</select><button class="remove-btn" onclick="removePlayer(${i})">✕</button>`; rd.appendChild(r); });
}

function addPlayerRow() { state.players.push({ name: 'Player ' + (state.players.length + 1), position: '' }); saveState(); renderSettingsPanel(); }
function removePlayer(idx) {
  Object.keys(state.assignments).forEach(pos => { if (state.assignments[pos] === idx) delete state.assignments[pos]; else if (state.assignments[pos] > idx) state.assignments[pos]--; });
  state.absent = state.absent.filter(i => i !== idx).map(i => i > idx ? i - 1 : i);
  state.gamePlans.forEach(plan => { Object.keys(plan.quarters).forEach(qk => { const q = plan.quarters[qk]; POSITIONS.forEach(pos => { if (q[pos] === idx) q[pos] = null; else if (q[pos] > idx) q[pos]--; }); if (q._swaps) { q._swaps = q._swaps.filter(sw => { let keep = true; ['a','b'].forEach(side => { if (sw[side] && sw[side].type === 'bench') { if (sw[side].key === idx) keep = false; else if (sw[side].key > idx) sw[side].key--; } }); return keep; }); } }); });
  state.players.splice(idx, 1); saveState(); renderSettingsPanel();
}

function saveSettings() {
  document.querySelectorAll('#timer-settings input').forEach(input => { const i = parseInt(input.dataset.preset); state.presets[i][input.dataset.field] = parseInt(input.value) || 0; });
  document.querySelectorAll('#roster-settings input, #roster-settings select').forEach(el => { const i = parseInt(el.dataset.player); if (el.dataset.field === 'name') state.players[i].name = el.value; if (el.dataset.field === 'position') state.players[i].position = el.value; });
  saveState();
}

// --- Game Plans UI ---
function renderGamePlansUI() {

  state.gamePlans.forEach((plan, i) => { const r = document.createElement('div'); r.className = 'setting-row'; r.style.marginBottom = '8px'; const a = state.activeGamePlan === i; r.innerHTML = `<span style="flex:1;font-weight:600;${a ? 'color:#27ae60' : ''}">${escHtml(plan.name)} ${a ? '(Active)' : ''}</span><button class="gp-btn gp-load" onclick="loadGamePlanSettings(${i})">Load</button><button class="gp-btn gp-save" onclick="editGamePlan(${i})" style="background:#f39c12">Edit</button><button class="gp-btn gp-delete" onclick="deleteGamePlan(${i})">Del</button>`; ld.appendChild(r); });
}
function newGamePlan() {
  editingPlanIdx = -1; gpEditQ = 1; gpFirstPick = null; gpSwapMode = false;
  gpQuarters = {}; gpMidSwaps = {};
  for (let q = 1; q <= 4; q++) { gpQuarters['Q' + q] = {}; gpMidSwaps['Q' + q] = []; }
  document.getElementById('gp-name').value = 'Plan ' + String.fromCharCode(65 + state.gamePlans.length);
  document.getElementById('gp-editor').style.display = 'block';
  renderPlanEditor();
}
function editGamePlan(idx) {
  editingPlanIdx = idx; gpEditQ = 1; gpFirstPick = null; gpSwapMode = false;
  gpQuarters = JSON.parse(JSON.stringify(state.gamePlans[idx].quarters || {}));
  gpMidSwaps = {};
  for (let q = 1; q <= 4; q++) {
    const qk = 'Q' + q;
    if (!gpQuarters[qk]) gpQuarters[qk] = {};
    gpMidSwaps[qk] = gpQuarters[qk]._swaps ? JSON.parse(JSON.stringify(gpQuarters[qk]._swaps)) : [];
  }
  document.getElementById('gp-name').value = state.gamePlans[idx].name;
  document.getElementById('gp-editor').style.display = 'block';
  renderPlanEditor();
}

// --- Plan editor state ---
let gpEditQ = 1;       // currently viewed quarter (1-4)
let gpFirstPick = null; // { type: 'field'|'bench', key: pos|playerIdx } for first tap
let gpQuarters = {};    // working copy: { Q1: { G: 0, LD: 1, ... }, Q2: ... }
let gpMidSwaps = {};    // { Q1: [ {a:{type,key}, b:{type,key}}, ... ], Q2: ... }
let gpSwapMode = false; // true when defining mid-quarter swap

function renderPlanEditor() {
  const c = document.getElementById('gp-quarters'); c.innerHTML = '';
  const qk = 'Q' + gpEditQ;
  const qd = gpQuarters[qk] || {};

  // Quarter tabs
  let tabs = '<div class="gp-qtabs">';
  for (let q = 1; q <= 4; q++) {
    tabs += `<button class="gp-qtab${q === gpEditQ ? ' active' : ''}" onclick="gpSwitchQuarter(${q})">Q${q}</button>`;
  }
  tabs += '</div>';
  c.innerHTML = tabs;

  // Diff summary if Q2+
  if (gpEditQ > 1) {
    const prevQk = 'Q' + (gpEditQ - 1);
    const prev = gpQuarters[prevQk] || {};
    const diffLines = gpGetDiffSummary(prev, qd);
    if (diffLines.length) {
      const diffDiv = document.createElement('div');
      diffDiv.className = 'gp-diff-summary';
      diffDiv.innerHTML = `Q${gpEditQ - 1} → Q${gpEditQ}: ` + diffLines.join(', ');
      c.appendChild(diffDiv);
    }
  }

  const OFFENSE = ['LW', 'M', 'RW'];
  const DEFENSE = ['LD', 'G', 'RD'];
  const prevLineup = gpEditQ > 1 ? (gpQuarters['Q' + (gpEditQ - 1)] || {}) : {};

  const midSwaps = gpMidSwaps[qk] || [];
  // Build set of positions involved in mid-Q swaps for highlighting
  const midSwapPositions = new Set();
  midSwaps.forEach(s => { if (s.a.type === 'field') midSwapPositions.add(s.a.key); if (s.b.type === 'field') midSwapPositions.add(s.b.key); });

  const field = document.createElement('div');
  field.className = 'gp-field';
  field.id = 'gp-field-active';
  let h = '';
  h += `<svg class="gp-swap-lines" id="gp-svg-active"></svg>`;

  // Offense row
  h += `<div class="gp-field-label">Offense</div>`;
  h += `<div class="gp-field-grid">`;
  OFFENSE.forEach(pos => {
    const pIdx = qd[pos];
    const name = (pIdx != null && state.players[pIdx]) ? escHtml(state.players[pIdx].name) : '';
    const isSelected = gpFirstPick && gpFirstPick.type === 'field' && gpFirstPick.key === pos;
    const changed = gpEditQ > 1 && qd[pos] !== prevLineup[pos];
    const inMidSwap = midSwapPositions.has(pos);
    h += `<div class="gp-cell${isSelected ? ' gp-swap-selected' : ''}${changed ? ' gp-changed' : ''}${inMidSwap ? ' gp-in-midswap' : ''}" data-pos="${pos}" onclick="gpTap('field','${pos}')">`;
    h += `<div class="gp-pos-label">${pos}</div>`;
    h += `<div class="gp-player-name${name ? '' : ' empty'}">${name || '—'}</div>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Defense row
  h += `<div class="gp-field-label">Defense</div>`;
  h += `<div class="gp-field-grid">`;
  DEFENSE.forEach(pos => {
    const pIdx = qd[pos];
    const name = (pIdx != null && state.players[pIdx]) ? escHtml(state.players[pIdx].name) : '';
    const isSelected = gpFirstPick && gpFirstPick.type === 'field' && gpFirstPick.key === pos;
    const changed = gpEditQ > 1 && qd[pos] !== prevLineup[pos];
    const inMidSwap = midSwapPositions.has(pos);
    h += `<div class="gp-cell${isSelected ? ' gp-swap-selected' : ''}${changed ? ' gp-changed' : ''}${inMidSwap ? ' gp-in-midswap' : ''}" data-pos="${pos}" onclick="gpTap('field','${pos}')">`;
    h += `<div class="gp-pos-label">${pos}</div>`;
    h += `<div class="gp-player-name${name ? '' : ' empty'}">${name || '—'}</div>`;
    h += `</div>`;
  });
  h += `</div>`;

  // Bench
  const onField = new Set(Object.values(qd).filter(v => v != null));
  const benchPlayers = state.players.map((p, i) => ({ name: p.name, idx: i })).filter(p => !onField.has(p.idx));
  h += `<div class="gp-bench-area">`;
  h += `<div class="gp-bench-label">Bench</div>`;
  h += `<div class="gp-bench-grid">`;
  benchPlayers.forEach(p => {
    const isSelected = gpFirstPick && gpFirstPick.type === 'bench' && gpFirstPick.key === p.idx;
    h += `<div class="gp-bench-chip${isSelected ? ' gp-swap-selected' : ''}" data-bench="${p.idx}" onclick="gpTap('bench',${p.idx})">${escHtml(p.name)}</div>`;
  });
  if (!benchPlayers.length) h += `<span style="color:#555;font-size:11px">All players on field</span>`;
  h += `</div></div>`;

  // Hint text
  if (gpSwapMode) {
    h += `<div class="gp-swap-hint" style="color:#e74c3c">${gpFirstPick ? 'Tap second position for swap' : 'Tap two positions to add a swap'}</div>`;
  } else {
    h += `<div class="gp-swap-hint">${gpFirstPick ? 'Tap a second position to swap' : 'Tap two positions to swap players'}</div>`;
  }

  field.innerHTML = h;
  c.appendChild(field);

  // Mid-quarter swaps section
  const swapSection = document.createElement('div');
  swapSection.style.cssText = 'margin-top:6px';
  let swapHtml = '';
  if (midSwaps.length > 0) {
    swapHtml += `<div style="font-size:10px;color:#f39c12;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Mid-Quarter Swaps</div>`;
    midSwaps.forEach((sw, i) => {
      const aName = sw.a.type === 'field' ? `${sw.a.key}: ${gpPlayerName(qd[sw.a.key])}` : gpPlayerName(sw.a.key) + ' (bench)';
      const bName = sw.b.type === 'field' ? `${sw.b.key}: ${gpPlayerName(qd[sw.b.key])}` : gpPlayerName(sw.b.key) + ' (bench)';
      swapHtml += `<div style="background:#3d2200;border-radius:6px;padding:5px 8px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:11px;color:#f39c12;font-weight:600">${aName} ↔ ${bName}</span>
        <button class="gp-btn gp-delete" style="padding:2px 6px;font-size:10px" onclick="gpRemoveMidSwap(${i})">✕</button>
      </div>`;
    });
  }
  if (gpSwapMode) {
    swapHtml += `<button class="gp-btn" style="width:100%;background:#c0392b;margin-top:4px" onclick="gpToggleSwapMode()">Done Planning Swaps</button>`;
  } else {
    swapHtml += `<button class="gp-btn" style="width:100%;background:#e67e22;margin-top:4px" onclick="gpToggleSwapMode()">${midSwaps.length ? '+ Add Another Swap' : 'Plan Mid-Q Swaps'}</button>`;
  }
  swapSection.innerHTML = swapHtml;
  c.appendChild(swapSection);

  // Draw SVG lines after DOM is ready
  requestAnimationFrame(() => gpDrawMidSwapLines(qk));

  // Copy from previous quarter button for Q1 only (to set initial lineup from current field)
  if (gpEditQ === 1 && Object.values(qd).every(v => v == null || v === undefined)) {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'gp-btn gp-load';
    copyBtn.style.cssText = 'width:100%;margin-top:6px';
    copyBtn.textContent = 'Copy Current Field Lineup';
    copyBtn.onclick = () => {
      Object.assign(gpQuarters.Q1, JSON.parse(JSON.stringify(state.assignments)));
      renderPlanEditor();
    };
    c.appendChild(copyBtn);
  }
}

function gpPlayerName(idx) {
  return (idx != null && state.players[idx]) ? state.players[idx].name : '—';
}

function gpToggleSwapMode() {
  gpSwapMode = !gpSwapMode;
  gpFirstPick = null;
  renderPlanEditor();
}

function gpRemoveMidSwap(idx) {
  const qk = 'Q' + gpEditQ;
  if (gpMidSwaps[qk]) gpMidSwaps[qk].splice(idx, 1);
  renderPlanEditor();
}

function gpDrawMidSwapLines(qk) {
  const svg = document.getElementById('gp-svg-active');
  const container = document.getElementById('gp-field-active');
  if (!svg || !container) return;
  svg.innerHTML = '';
  const swaps = gpMidSwaps[qk] || [];
  if (!swaps.length) return;

  const rect = container.getBoundingClientRect();
  // Set viewBox to match actual pixel dimensions for correct line placement
  svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);

  swaps.forEach(sw => {
    // Find the DOM elements for each side of the swap
    let elA = null, elB = null;
    if (sw.a.type === 'field') elA = container.querySelector(`.gp-cell[data-pos="${sw.a.key}"]`);
    else elA = container.querySelector(`.gp-bench-chip[data-bench="${sw.a.key}"]`);
    if (sw.b.type === 'field') elB = container.querySelector(`.gp-cell[data-pos="${sw.b.key}"]`);
    else elB = container.querySelector(`.gp-bench-chip[data-bench="${sw.b.key}"]`);
    if (!elA || !elB) return;

    const rA = elA.getBoundingClientRect();
    const rB = elB.getBoundingClientRect();
    const ax = rA.left + rA.width / 2 - rect.left;
    const ay = rA.top + rA.height / 2 - rect.top;
    const bx = rB.left + rB.width / 2 - rect.left;
    const by = rB.top + rB.height / 2 - rect.top;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', ax); line.setAttribute('y1', ay);
    line.setAttribute('x2', bx); line.setAttribute('y2', by);
    line.setAttribute('stroke', '#f39c12');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '6,4');
    line.setAttribute('stroke-opacity', '0.6');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  });
}

function gpSwitchQuarter(q) {
  gpFirstPick = null; gpSwapMode = false;
  // If switching to a quarter that has no lineup, inherit from previous
  const qk = 'Q' + q;
  if (!gpQuarters[qk]) gpQuarters[qk] = {};
  const hasAny = Object.values(gpQuarters[qk]).some(v => v != null);
  if (!hasAny && q > 1) {
    const prevQk = 'Q' + (q - 1);
    if (gpQuarters[prevQk]) gpQuarters[qk] = JSON.parse(JSON.stringify(gpQuarters[prevQk]));
  }
  gpEditQ = q;
  renderPlanEditor();
}

function gpTap(type, key) {
  const qk = 'Q' + gpEditQ;
  if (!gpQuarters[qk]) gpQuarters[qk] = {};

  if (!gpFirstPick) {
    gpFirstPick = { type, key };
    renderPlanEditor();
    return;
  }

  // Same spot? deselect
  if (gpFirstPick.type === type && gpFirstPick.key === key) {
    gpFirstPick = null;
    renderPlanEditor();
    return;
  }

  // Can't swap bench-to-bench
  if (gpFirstPick.type === 'bench' && type === 'bench') {
    gpFirstPick = { type, key };
    renderPlanEditor();
    return;
  }

  if (gpSwapMode) {
    // In mid-quarter swap definition mode - add pair to array, stay in swap mode
    if (!gpMidSwaps[qk]) gpMidSwaps[qk] = [];
    gpMidSwaps[qk].push({ a: { ...gpFirstPick }, b: { type, key } });
    gpFirstPick = null;
    renderPlanEditor();
    return;
  }

  // Normal mode - actually swap players in the lineup
  const a = gpFirstPick, b = { type, key };
  if (a.type === 'field' && b.type === 'field') {
    const tmp = gpQuarters[qk][a.key];
    gpQuarters[qk][a.key] = gpQuarters[qk][b.key];
    gpQuarters[qk][b.key] = tmp;
  } else if (a.type === 'field' && b.type === 'bench') {
    gpQuarters[qk][a.key] = b.key;
  } else if (a.type === 'bench' && b.type === 'field') {
    gpQuarters[qk][b.key] = a.key;
  }

  gpFirstPick = null;
  renderPlanEditor();
}

function gpGetDiffSummary(prev, next) {
  const changes = [];
  POSITIONS.forEach(pos => {
    const p = prev[pos], n = next[pos];
    if (p !== n && (p !== undefined || n !== undefined)) {
      const pn = p != null && state.players[p] ? state.players[p].name : '—';
      const nn = n != null && state.players[n] ? state.players[n].name : '—';
      changes.push(`${pos}: ${pn}→${nn}`);
    }
  });
  return changes;
}

function getSwapSummary(prev, next) {
  return gpGetDiffSummary(prev, next).join(', ');
}

function saveGamePlan() {
  const name = document.getElementById('gp-name').value.trim() || 'Untitled';
  const quarters = JSON.parse(JSON.stringify(gpQuarters));
  // Store mid-quarter swaps
  for (let q = 1; q <= 4; q++) {
    const qk = 'Q' + q;
    if (!quarters[qk]) quarters[qk] = {};
    if (gpMidSwaps[qk] && gpMidSwaps[qk].length) quarters[qk]._swaps = JSON.parse(JSON.stringify(gpMidSwaps[qk]));
    else delete quarters[qk]._swaps;
  }
  if (editingPlanIdx >= 0) state.gamePlans[editingPlanIdx] = { name, quarters }; else { state.gamePlans.push({ name, quarters }); editingPlanIdx = state.gamePlans.length - 1; }
  saveState(); renderGamePlansUI();
}

function loadGamePlanSettings(idx) { loadGamePlanByIdx(idx); closeSettings(); }
function deleteGamePlan(idx) {
  const planName = state.gamePlans[idx] ? state.gamePlans[idx].name : 'this plan';
  if (!confirm('Delete "' + planName + '"? This cannot be undone.')) return;
  if (state.activeGamePlan === idx) state.activeGamePlan = null; else if (state.activeGamePlan != null && state.activeGamePlan > idx) state.activeGamePlan--;
  state.gamePlans.splice(idx, 1); saveState(); renderGamePlansUI();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

let pmSelectedObj = null;

let pmTeamColor = '#e94560'; // red default, toggles to blue #3498db
let pmNextLabel = 65; // ASCII 'A'

let pmRunIdx = 0, pmRunStep = 0, pmRunTimer = null, pmRunSeconds = 0, pmRunRunning = false;
let pmUndoStack = [];
const PM_MAX_UNDO = 50;

function pmPushUndo() {
  if (!pmCurrentDrill || !pmCurrentDrill.steps[pmCurrentStep]) return;
  pmUndoStack.push({ step: pmCurrentStep, objects: JSON.stringify(pmCurrentDrill.steps[pmCurrentStep].objects) });
  if (pmUndoStack.length > PM_MAX_UNDO) pmUndoStack.shift();
}

function pmUndo() {
  if (pmUndoStack.length === 0) return;
  const entry = pmUndoStack.pop();
  if (pmCurrentDrill && pmCurrentDrill.steps[entry.step]) {
    pmCurrentDrill.steps[entry.step].objects = JSON.parse(entry.objects);
    pmCurrentStep = entry.step;
  }
  pmSelectedObj = null; pmArrowStart = null;
  pmRenderStepBar(); pmRenderObjects();
}

function pmFindObjById(step, id) {
  return step.objects.find(o => o.id === id);
}

function loadPracticeState() {
  try { const s = JSON.parse(localStorage.getItem('soccer-coach-practice')); if (s && s.drills) return s; } catch(e) {}
  return { drills: [], sessions: [{ id: 'default', name: 'Practice Plan', drills: [] }] };
}
function savePracticeState() { localStorage.setItem('soccer-coach-practice', JSON.stringify(pmState)); }

function goHome() {
  if (timerRunning) toggleTimer();
  document.getElementById('game-mode').classList.remove('active');
  document.getElementById('practice-mode').classList.remove('active');
  document.getElementById('home-screen').classList.remove('hidden');
  document.getElementById('nav-buttons').classList.add('visible');
  document.getElementById('nav-close-btn').style.display = 'none';
  appMode = 'home';
}

function goToMode(mode) {
  document.getElementById('home-screen').classList.add('hidden');
  document.getElementById('game-mode').classList.remove('active');
  document.getElementById('practice-mode').classList.remove('active');
  document.getElementById('nav-buttons').classList.add('visible');
