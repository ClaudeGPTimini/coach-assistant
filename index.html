function pmSwitchTab(tab) {
  document.querySelectorAll('.pm-tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'designer' && i === 0) || (tab === 'library' && i === 1) || (tab === 'session' && i === 2));
  });
  document.getElementById('pm-designer').classList.toggle('active', tab === 'designer');
  document.getElementById('pm-library-view').classList.toggle('active', tab === 'library');
  document.getElementById('pm-session-view').classList.toggle('active', tab === 'session');
  document.getElementById('pm-run-view').classList.remove('active');
  if (tab === 'library') pmRenderLibrary();
  if (tab === 'session') pmRenderSession();
  if (tab === 'designer') pmRenderDesigner();
}

// --- Field SVG Generation ---
function pmGenerateFieldSVG(svgEl, fieldType) {
  svgEl.innerHTML = '';
  const pad = 50;
  const w = fieldType === 'half' ? 500 : 1000, h = 600;
  svgEl.setAttribute('viewBox', `${-pad} ${-pad} ${w + pad*2} ${h + pad*2}`);
  const s = (tag, attrs) => { const e = document.createElementNS('http://www.w3.org/2000/svg', tag); Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v)); svgEl.appendChild(e); return e; };
  // Out-of-bounds strips (slightly darker green to show sideline area)
  s('rect', { x:-pad, y:-pad, width:pad, height:h+pad*2, fill:'rgba(0,0,0,0.15)' });
  s('rect', { x:w, y:-pad, width:pad, height:h+pad*2, fill:'rgba(0,0,0,0.15)' });
  s('rect', { x:0, y:-pad, width:w, height:pad, fill:'rgba(0,0,0,0.15)' });
  s('rect', { x:0, y:h, width:w, height:pad, fill:'rgba(0,0,0,0.15)' });
  s('rect', { x:0, y:0, width:w, height:h, fill:'none', stroke:'#fff', 'stroke-width':3 });
  if (fieldType === 'full') {
    s('line', { x1:500, y1:0, x2:500, y2:600, stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('circle', { cx:500, cy:300, r:80, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('circle', { cx:500, cy:300, r:4, fill:'rgba(255,255,255,.5)' });
    s('rect', { x:0, y:175, width:120, height:250, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('rect', { x:0, y:225, width:50, height:150, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('rect', { x:880, y:175, width:120, height:250, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('rect', { x:950, y:225, width:50, height:150, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    const p1 = s('path', { d:'M 120 250 A 60 60 0 0 1 120 350', fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    const p2 = s('path', { d:'M 880 250 A 60 60 0 0 0 880 350', fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
  } else {
    s('circle', { cx:500, cy:300, r:80, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('line', { x1:500, y1:0, x2:500, y2:600, stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('rect', { x:0, y:175, width:120, height:250, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('rect', { x:0, y:225, width:50, height:150, fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
    s('path', { d:'M 120 250 A 60 60 0 0 1 120 350', fill:'none', stroke:'rgba(255,255,255,.5)', 'stroke-width':2 });
  }
}

// --- Drill CRUD ---
function pmNewDrill() {
  pmCurrentDrill = { id: 'drill_' + Date.now(), name: 'New Drill', fieldType: 'full', steps: [{ label: 'Step 1', objects: [] }], notes: '' };
  pmCurrentStep = 0; pmNextLabel = 65; pmSelectedObj = null; pmArrowStart = null;
  // Ensure we're in practice mode
  if (appMode !== 'practice') goToMode('practice');
  pmSwitchTab('designer');
}

function pmEditDrill(id) {
  const drill = pmState.drills.find(d => d.id === id);
  if (!drill) return;
  pmCurrentDrill = JSON.parse(JSON.stringify(drill)); // deep copy
  pmCurrentStep = 0; pmSelectedObj = null; pmArrowStart = null;
  pmRecalcNextLabel();
  pmSwitchTab('designer');
}

function pmDuplicateDrill(id) {
  const drill = pmState.drills.find(d => d.id === id);
  if (!drill) return;
  const copy = JSON.parse(JSON.stringify(drill));
  copy.id = 'drill_' + Date.now(); copy.name = drill.name + ' (copy)';
  pmState.drills.push(copy); savePracticeState(); pmRenderLibrary();
}

function pmDeleteDrill(id) {
  pmState.drills = pmState.drills.filter(d => d.id !== id);
  pmState.sessions.forEach(s => { s.drills = s.drills.filter(d => d.drillId !== id); });
  savePracticeState(); pmRenderLibrary();
}

function pmSaveDrill() {
  if (!pmCurrentDrill) return;
  const idx = pmState.drills.findIndex(d => d.id === pmCurrentDrill.id);
  if (idx >= 0) pmState.drills[idx] = JSON.parse(JSON.stringify(pmCurrentDrill));
  else pmState.drills.push(JSON.parse(JSON.stringify(pmCurrentDrill)));
  savePracticeState();
  document.getElementById('pm-drill-title').textContent = pmCurrentDrill.name + ' ✓';
  setTimeout(() => { if (pmCurrentDrill) document.getElementById('pm-drill-title').textContent = pmCurrentDrill.name; }, 1000);
}

function pmRenameDrill() {
  if (!pmCurrentDrill) return;
  const name = prompt('Drill name:', pmCurrentDrill.name);
  if (name && name.trim()) { pmCurrentDrill.name = name.trim(); document.getElementById('pm-drill-title').textContent = pmCurrentDrill.name; }
}

function pmSetFieldType(type) {
  if (!pmCurrentDrill) return;
  pmCurrentDrill.fieldType = type;
  pmRenderDesigner();
}

function pmRecalcNextLabel() {
  if (!pmCurrentDrill) return;
  let maxCode = 64;
  pmCurrentDrill.steps.forEach(step => {
    step.objects.forEach(obj => { if (obj.type === 'player' && obj.label && obj.label.length === 1) { const c = obj.label.charCodeAt(0); if (c > maxCode) maxCode = c; } });
  });
  pmNextLabel = maxCode + 1;
}

// --- Designer Rendering ---
function pmRenderDesigner() {
  if (!pmCurrentDrill) return;
  document.getElementById('pm-drill-title').textContent = pmCurrentDrill.name;
  document.getElementById('pm-field-type').value = pmCurrentDrill.fieldType;
  pmGenerateFieldSVG(document.getElementById('pm-field-svg'), pmCurrentDrill.fieldType);
  pmRenderStepBar();
  pmRenderObjects();
}

function pmRenderStepBar() {
  const bar = document.getElementById('pm-step-bar'); bar.innerHTML = '';
  if (!pmCurrentDrill) return;
  pmCurrentDrill.steps.forEach((step, i) => {
    const btn = document.createElement('button');
    btn.className = 'pm-step-btn' + (i === pmCurrentStep ? ' active' : '');
    btn.textContent = (i + 1);
    // Tooltip with step description
    var tip = 'Step ' + (i + 1);
    if (step.description) tip += ': ' + step.description;
    btn.title = tip;
    btn.onclick = () => { pmCurrentStep = i; pmSelectedObj = null; pmArrowStart = null; pmRenderStepBar(); pmRenderObjects(); };
    // Double-click to edit step description
    btn.ondblclick = (e) => { e.stopPropagation(); pmEditStepDescription(i); };
    // Long press to delete step (touch), or edit description (right-click)
    let ht;
    btn.ontouchstart = () => { ht = setTimeout(() => { pmEditStepDescription(i); ht = null; }, 600); };
    btn.ontouchend = () => { if (ht) clearTimeout(ht); };
    btn.ontouchmove = () => { if (ht) clearTimeout(ht); };
    btn.oncontextmenu = (e) => { e.preventDefault(); if (pmCurrentDrill.steps.length > 1) { pmCurrentDrill.steps.splice(i, 1); if (pmCurrentStep >= pmCurrentDrill.steps.length) pmCurrentStep = pmCurrentDrill.steps.length - 1; pmRenderStepBar(); pmRenderObjects(); } };
    bar.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'pm-step-btn add';
  addBtn.textContent = '+';
  addBtn.onclick = () => {
    const prev = pmCurrentDrill.steps[pmCurrentStep];
    pmCurrentDrill.steps.push({ label: 'Step ' + (pmCurrentDrill.steps.length + 1), objects: JSON.parse(JSON.stringify(prev.objects)) });
    pmCurrentStep = pmCurrentDrill.steps.length - 1;
    pmSelectedObj = null; pmArrowStart = null;
    pmRenderStepBar(); pmRenderObjects();
  };
  bar.appendChild(addBtn);
}

function pmEditStepDescription(i) {
  if (!pmCurrentDrill || !pmCurrentDrill.steps[i]) return;
  var current = pmCurrentDrill.steps[i].description || '';
  var desc = prompt('Step ' + (i + 1) + ' description:', current);
  if (desc !== null) {
    pmCurrentDrill.steps[i].description = desc.trim();
    pmRenderStepBar();
  }
}

// Helper: create player icon (pink girl) at (cx, cy)
function createPlayerIcon(parentG, cx, cy, color, size) {

  var oy = cy - (PLAYER_VB / 2) * scale;
  var ig = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  ig.setAttribute('transform', 'translate(' + ox + ',' + oy + ') scale(' + scale + ')');

  var head = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  head.setAttribute('cx', 256); head.setAttribute('cy', 43.898); head.setAttribute('r', 43.898);

  var body = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  body.setAttribute('d', PLAYER_BODY_PATH); body.setAttribute('fill', color);
  ig.appendChild(body);
  parentG.appendChild(ig);

  if (!pmCurrentDrill || !pmCurrentDrill.steps[pmCurrentStep]) return;

  svg.setAttribute('viewBox', vb);

  step.objects.forEach((obj, i) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('pm-obj');
    g.dataset.idx = i;
    if (pmSelectedObj === i) g.classList.add('selected');

      t.setAttribute('stroke', '#000'); t.setAttribute('stroke-width', '3');
      t.textContent = obj.label || '?';

      tri.setAttribute('points', `${x},${y-18} ${x-14},${y+12} ${x+14},${y+12}`);

      t.setAttribute('text-anchor', 'middle'); t.setAttribute('paint-order', 'stroke');
      t.setAttribute('stroke', '#000'); t.setAttribute('stroke-width', '3');
      t.textContent = obj.text || '';
      g.appendChild(t);
      if (pmSelectedObj === i) {
        var bbox = 20;
        var bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bg.setAttribute('x', obj.x - 50); bg.setAttribute('y', obj.y - 16);
        bg.setAttribute('width', 100); bg.setAttribute('height', 24);
        bg.setAttribute('fill', 'none'); bg.setAttribute('stroke', '#f1c40f'); bg.setAttribute('stroke-width', 1.5); bg.setAttribute('stroke-dasharray', '4,3'); bg.setAttribute('rx', 4);
        g.insertBefore(bg, g.firstChild);
      }
      var hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', obj.x - 50); hit.setAttribute('y', obj.y - 16);
      hit.setAttribute('width', 100); hit.setAttribute('height', 24);
      hit.setAttribute('fill', 'transparent'); hit.style.cursor = 'pointer';
      g.appendChild(hit);
    } else if (obj.type === 'arrow') {
      // Resolve anchor positions
      var ax1 = obj.x1, ay1 = obj.y1, ax2 = obj.x2, ay2 = obj.y2;
      if (obj.anchor1) { var anc = pmFindObjById(step, obj.anchor1); if (anc) { ax1 = anc.x; ay1 = anc.y; obj.x1 = ax1; obj.y1 = ay1; } }
      if (obj.anchor2) { var anc = pmFindObjById(step, obj.anchor2); if (anc) { ax2 = anc.x; ay2 = anc.y; obj.x2 = ax2; obj.y2 = ay2; } }
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', ax1); line.setAttribute('y1', ay1);
      line.setAttribute('x2', ax2); line.setAttribute('y2', ay2);
      const isDash = obj.style === 'dashed';
      line.setAttribute('stroke', isDash ? '#f1c40f' : '#fff');
      line.setAttribute('stroke-width', 4);
      if (isDash) line.setAttribute('stroke-dasharray', '12,8');
      line.setAttribute('marker-end', isDash ? 'url(#pm-arrowhead-dash)' : 'url(#pm-arrowhead)');
      g.appendChild(line);
      // Selection indicators for endpoints
      if (pmSelectedObj === i) {
        [{ x: ax1, y: ay1 }, { x: ax2, y: ay2 }].forEach(ep => {
          var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', ep.x); c.setAttribute('cy', ep.y); c.setAttribute('r', 6);
          c.setAttribute('fill', '#f1c40f'); c.setAttribute('opacity', '0.7');
          g.appendChild(c);
        });
      }
      var hitLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      hitLine.setAttribute('x1', ax1); hitLine.setAttribute('y1', ay1);
      hitLine.setAttribute('x2', ax2); hitLine.setAttribute('y2', ay2);
      hitLine.setAttribute('stroke', 'transparent'); hitLine.setAttribute('stroke-width', 24);
      g.appendChild(hitLine);
    }

    svg.appendChild(g);
  });
}

// --- Tool Selection ---
function pmSelectTool(tool) {
  pmActiveTool = tool;
  pmSelectedObj = null; pmArrowStart = null;
  document.querySelectorAll('.pm-tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  pmRenderObjects();
}

function pmToggleTeamColor() {
  if (pmTeamColor === '#e94560') { pmTeamColor = '#3498db'; }
  else { pmTeamColor = '#e94560'; }
  const btn = document.getElementById('pm-color-btn');
  btn.style.background = pmTeamColor;
  btn.style.borderColor = pmTeamColor;
  btn.textContent = pmTeamColor === '#e94560' ? 'RED' : 'BLU';
}

// --- Field Interaction ---
(function() {
  const getField = () => document.getElementById('pm-draw-layer');

  function getSVGPoint(svg, e) {
    const pt = svg.createSVGPoint();
    const touch = e.touches ? e.touches[0] : e;
    pt.x = touch.clientX; pt.y = touch.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function findObjAt(svg, e) {
    const el = e.target.closest('.pm-obj');
    return el ? parseInt(el.dataset.idx) : -1;
  }

  document.addEventListener('click', function(e) {
    const svg = getField();
    if (!svg || !svg.contains(e.target)) return;
    if (!pmCurrentDrill || !pmCurrentDrill.steps[pmCurrentStep]) return;
    const step = pmCurrentDrill.steps[pmCurrentStep];
    const pt = getSVGPoint(svg, e);
    const objIdx = findObjAt(svg, e);

    if (pmActiveTool === 'edit') {
      if (objIdx >= 0 && pmSelectedObj === objIdx) {
        // Second tap on selected object: delete it
        pmPushUndo();
        step.objects.splice(objIdx, 1);
        pmSelectedObj = null;
      } else {
        pmSelectedObj = objIdx >= 0 ? objIdx : null;
      }
      pmRenderObjects();
    } else if (pmActiveTool === 'delete') {
      if (objIdx >= 0) { pmPushUndo(); step.objects.splice(objIdx, 1); pmSelectedObj = null; pmRenderObjects(); }
    } else if (pmActiveTool === 'text') {
      if (objIdx >= 0) return;
      var txt = prompt('Enter text:');
      if (!txt || !txt.trim()) return;
      pmPushUndo();
      step.objects.push({ type: 'text', id: 'obj_' + Date.now(), x: Math.round(pt.x), y: Math.round(pt.y), text: txt.trim(), color: '#fff', fontSize: 20 });
      pmRenderObjects();
    } else if (pmActiveTool === 'player') {
      if (objIdx >= 0) return;
      pmPushUndo();
      step.objects.push({ type: 'player', id: 'obj_' + Date.now(), x: Math.round(pt.x), y: Math.round(pt.y), label: String.fromCharCode(pmNextLabel++), color: pmTeamColor });
      pmRenderObjects();
    } else if (pmActiveTool === 'cone') {
      if (objIdx >= 0) return;
      pmPushUndo();
      step.objects.push({ type: 'cone', id: 'obj_' + Date.now(), x: Math.round(pt.x), y: Math.round(pt.y) });
      pmRenderObjects();
    } else if (pmActiveTool === 'ball') {
      if (objIdx >= 0) return;
      pmPushUndo();
      step.objects.push({ type: 'ball', id: 'obj_' + Date.now(), x: Math.round(pt.x), y: Math.round(pt.y) });
      pmRenderObjects();
    } else if (pmActiveTool === 'coach') {
      if (objIdx >= 0) return;
      pmPushUndo();
      step.objects.push({ type: 'coach', id: 'obj_' + Date.now(), x: Math.round(pt.x), y: Math.round(pt.y), label: 'Coach' });
      pmRenderObjects();
    } else if (pmActiveTool === 'arrow' || pmActiveTool === 'arrow-dash') {
      if (!pmArrowStart) {
        // First click: if on an object, anchor to it
        if (objIdx >= 0 && step.objects[objIdx] && step.objects[objIdx].type !== 'arrow') {
          var ancObj = step.objects[objIdx];
          pmArrowStart = { x: ancObj.x, y: ancObj.y, anchorId: ancObj.id };
        } else {
          pmArrowStart = { x: Math.round(pt.x), y: Math.round(pt.y), anchorId: null };
        }
      } else {
        pmPushUndo();
        var arrowObj = { type: 'arrow', id: 'obj_' + Date.now(), x1: pmArrowStart.x, y1: pmArrowStart.y, x2: Math.round(pt.x), y2: Math.round(pt.y), style: pmActiveTool === 'arrow-dash' ? 'dashed' : 'solid' };
        if (pmArrowStart.anchorId) arrowObj.anchor1 = pmArrowStart.anchorId;
        // Second click: if on an object, anchor end to it
        if (objIdx >= 0 && step.objects[objIdx] && step.objects[objIdx].type !== 'arrow') {
          var ancObj2 = step.objects[objIdx];
          arrowObj.x2 = ancObj2.x; arrowObj.y2 = ancObj2.y;
          arrowObj.anchor2 = ancObj2.id;
        }
        step.objects.push(arrowObj);
        pmArrowStart = null;
        pmRenderObjects();
      }
    }
  });

  // --- Unified drag (touch + mouse) with arrow support ---
  function distPt(ax, ay, bx, by) { return Math.sqrt((ax-bx)*(ax-bx) + (ay-by)*(ay-by)); }

  function startDrag(svg, e) {
    if (pmActiveTool !== 'edit') return;
    const objIdx = findObjAt(svg, e);
    if (objIdx < 0) return;
    const step = pmCurrentDrill && pmCurrentDrill.steps[pmCurrentStep];
    if (!step) return;
    const obj = step.objects[objIdx];
    if (!obj) return;
    const pt = getSVGPoint(svg, e);
    pmPushUndo();
    pmDragObj = objIdx;
    pmSelectedObj = objIdx;

    if (obj.type === 'arrow') {
      // Determine which part: near start, near end, or middle
      var d1 = distPt(pt.x, pt.y, obj.x1, obj.y1);
      var d2 = distPt(pt.x, pt.y, obj.x2, obj.y2);
      var threshold = 25;
      if (d1 < threshold && d1 <= d2) {
        pmDragPart = 'start';
        pmDragOffset = { dx: obj.x1 - pt.x, dy: obj.y1 - pt.y };
      } else if (d2 < threshold) {
        pmDragPart = 'end';
        pmDragOffset = { dx: obj.x2 - pt.x, dy: obj.y2 - pt.y };
      } else {
        pmDragPart = 'middle';
        pmDragOffset = { dx: 0, dy: 0, sx: pt.x, sy: pt.y, ox1: obj.x1, oy1: obj.y1, ox2: obj.x2, oy2: obj.y2 };
      }
      // Clear anchors when manually dragging an arrow
      if (pmDragPart === 'start') obj.anchor1 = null;
      if (pmDragPart === 'end') obj.anchor2 = null;
      if (pmDragPart === 'middle') { obj.anchor1 = null; obj.anchor2 = null; }
    } else {
      pmDragPart = null;
      pmDragOffset = { dx: obj.x - pt.x, dy: obj.y - pt.y };
    }
    pmRenderObjects();
  }

  function moveDrag(svg, e) {
    if (pmDragObj === null) return;
    const step = pmCurrentDrill && pmCurrentDrill.steps[pmCurrentStep];
    if (!step) return;
    const obj = step.objects[pmDragObj];
    if (!obj) return;
    const pt = getSVGPoint(svg, e);

    if (obj.type === 'arrow') {
      if (pmDragPart === 'start') {
        obj.x1 = Math.round(pt.x + pmDragOffset.dx);
        obj.y1 = Math.round(pt.y + pmDragOffset.dy);
      } else if (pmDragPart === 'end') {
        obj.x2 = Math.round(pt.x + pmDragOffset.dx);
        obj.y2 = Math.round(pt.y + pmDragOffset.dy);
      } else if (pmDragPart === 'middle') {
        var ddx = pt.x - pmDragOffset.sx, ddy = pt.y - pmDragOffset.sy;
        obj.x1 = Math.round(pmDragOffset.ox1 + ddx);
        obj.y1 = Math.round(pmDragOffset.oy1 + ddy);
        obj.x2 = Math.round(pmDragOffset.ox2 + ddx);
        obj.y2 = Math.round(pmDragOffset.oy2 + ddy);
      }
    } else {
      obj.x = Math.round(pt.x + pmDragOffset.dx);
      obj.y = Math.round(pt.y + pmDragOffset.dy);
    }
    pmRenderObjects();
  }

  function endDrag() {
    pmDragObj = null; pmDragOffset = null; pmDragPart = null;
  }

  document.addEventListener('touchstart', function(e) {
    const svg = getField();
    if (!svg || !svg.contains(e.target)) return;
    startDrag(svg, e);
    if (pmDragObj !== null) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (pmDragObj === null) return;
    const svg = getField(); if (!svg) return;
    moveDrag(svg, e);
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', endDrag);

  document.addEventListener('mousedown', function(e) {
    const svg = getField();
    if (!svg || !svg.contains(e.target)) return;
    startDrag(svg, e);
  });

  document.addEventListener('mousemove', function(e) {
    if (pmDragObj === null) return;
    const svg = getField(); if (!svg) return;
    moveDrag(svg, e);
  });

  document.addEventListener('mouseup', endDrag);
})();

// --- Library View ---
function pmShowLibrary() { pmSwitchTab('library'); }

function pmRenderLibrary() {
  const c = document.getElementById('pm-library');
  c.innerHTML = `<div id="pm-library-header"><h3>Drill Library</h3><div style="display:flex;gap:6px"><button class="add-btn" onclick="pmImportDrill()" style="background:#2980b9;font-size:12px;padding:6px 10px">📥 Import</button><button class="add-btn" onclick="pmNewDrill()">+ New Drill</button></div></div>`;
  if (pmState.drills.length === 0) {
    c.innerHTML += '<p style="color:#aaa;text-align:center;padding:20px">No drills yet. Tap + to create one.</p>';
    return;
  }
  pmState.drills.forEach(drill => {
    const card = document.createElement('div');
    card.className = 'pm-drill-card';
    card.innerHTML = `<h4>${escHtml(drill.name)}</h4><div class="pm-drill-meta">${drill.steps.length} step${drill.steps.length !== 1 ? 's' : ''} · ${drill.fieldType === 'half' ? 'Half' : 'Full'} field</div><div class="pm-drill-actions"><button onclick="event.stopPropagation();pmEditDrill('${drill.id}')">Edit</button><button onclick="event.stopPropagation();pmDuplicateDrill('${drill.id}')">Copy</button><button onclick="event.stopPropagation();pmExportDrillById('${drill.id}')">Export</button><button onclick="event.stopPropagation();pmDeleteDrill('${drill.id}')" style="color:#e74c3c">Delete</button></div>`;
    card.onclick = () => pmEditDrill(drill.id);
    c.appendChild(card);
  });
}

// --- Session View ---
function pmRenderSession() {
  const c = document.getElementById('pm-session');
  const session = pmState.sessions[0]; // use first session
  c.innerHTML = `<div id="pm-library-header"><h3>Practice Plan</h3><button class="add-btn" onclick="pmAddDrillToSession()">+ Add Drill</button></div>`;

  if (session.drills.length === 0) {
    c.innerHTML += '<p style="color:#aaa;text-align:center;padding:20px">No drills in plan. Add drills from your library.</p>';
  } else {
    session.drills.forEach((item, i) => {
      const drill = pmState.drills.find(d => d.id === item.drillId);
      const name = drill ? drill.name : '(deleted)';
      const div = document.createElement('div');
      div.className = 'pm-session-item';
      div.innerHTML = `<span style="color:#aaa;font-size:11px;font-weight:700;width:20px">${i + 1}.</span><span class="pm-si-name">${escHtml(name)}</span><input type="number" min="1" max="60" value="${item.durationMinutes}" onchange="pmSetDrillDuration(${i},this.value)"> min<button onclick="pmMoveSessionDrill(${i},-1)">▲</button><button onclick="pmMoveSessionDrill(${i},1)">▼</button><button onclick="pmRemoveSessionDrill(${i})" style="color:#e74c3c">✕</button>`;
      c.appendChild(div);
    });
    const total = session.drills.reduce((s, d) => s + (d.durationMinutes || 0), 0);
    c.innerHTML += `<div id="pm-session-total">Total: ${total} minutes</div>`;
  }

  if (session.drills.length > 0) {
    c.innerHTML += `<div style="text-align:center;padding:10px"><button class="add-btn" onclick="pmStartRun()" style="background:#8e44ad;font-size:15px;padding:10px 24px">▶ RUN PRACTICE</button></div>`;
  }
}

function pmAddDrillToSession() {
  if (pmState.drills.length === 0) { alert('Create some drills first!'); return; }
  const name = pmState.drills.map((d, i) => `${i + 1}. ${d.name}`).join('\n');
  const pick = prompt('Enter drill number to add:\n\n' + name);
  if (!pick) return;
  const idx = parseInt(pick) - 1;
  if (idx >= 0 && idx < pmState.drills.length) {
    pmState.sessions[0].drills.push({ drillId: pmState.drills[idx].id, durationMinutes: 10 });
    savePracticeState(); pmRenderSession();
  }
}

function pmSetDrillDuration(i, val) {
  pmState.sessions[0].drills[i].durationMinutes = parseInt(val) || 5;
  savePracticeState(); pmRenderSession();
}

function pmMoveSessionDrill(i, dir) {
  const arr = pmState.sessions[0].drills;
  const ni = i + dir;
  if (ni < 0 || ni >= arr.length) return;
  [arr[i], arr[ni]] = [arr[ni], arr[i]];
  savePracticeState(); pmRenderSession();
}

function pmRemoveSessionDrill(i) {
  pmState.sessions[0].drills.splice(i, 1);
  savePracticeState(); pmRenderSession();
}

// --- Session Runner ---
function pmStartRun() {
  const session = pmState.sessions[0];
  if (!session.drills.length) return;
  pmRunIdx = 0; pmRunStep = 0; pmRunSeconds = 0; pmRunRunning = false;
  document.querySelectorAll('.pm-view').forEach(v => v.classList.remove('active'));
  document.getElementById('pm-run-view').classList.add('active');
  document.querySelectorAll('.pm-tab').forEach(t => t.classList.remove('active'));
  pmRenderRunView();
}

function pmStopRun() {
  if (pmRunRunning) { clearInterval(pmRunTimer); pmRunRunning = false; }
  pmSwitchTab('session');
}

function pmRenderRunView() {
  const session = pmState.sessions[0];
  const item = session.drills[pmRunIdx];
  if (!item) return;
  const drill = pmState.drills.find(d => d.id === item.drillId);
  if (!drill) return;
  document.getElementById('pm-run-drill-title').textContent = drill.name;
  document.getElementById('pm-run-progress').textContent = `Drill ${pmRunIdx + 1} of ${session.drills.length}`;
  // Field
  pmGenerateFieldSVG(document.getElementById('pm-run-field-svg'), drill.fieldType);
  const drawSvg = document.getElementById('pm-run-draw-layer');
  drawSvg.setAttribute('viewBox', drill.fieldType === 'half' ? '-50 -50 600 700' : '-50 -50 1100 700');
  pmRenderRunObjects(drawSvg, drill, pmRunStep);
  // Step bar
  const bar = document.getElementById('pm-run-step-bar');
  bar.innerHTML = '';
  drill.steps.forEach((step, i) => {
    const btn = document.createElement('button');
    btn.className = 'pm-step-btn' + (i === pmRunStep ? ' active' : '');
    btn.textContent = (i + 1);
    var tip = 'Step ' + (i + 1);
    if (step.description) tip += ': ' + step.description;
    btn.title = tip;
    btn.onclick = () => { pmRunStep = i; pmRenderRunView(); };
    bar.appendChild(btn);
  });
  pmUpdateRunTimer();
}

function pmRenderRunObjects(svg, drill, stepIdx) {
  // Preserve defs if any
  let defs = svg.querySelector('defs');
  svg.innerHTML = '';
  if (!defs) {
    defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    const m1 = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    m1.setAttribute('id', 'pm-run-ah'); m1.setAttribute('markerWidth', '10'); m1.setAttribute('markerHeight', '7');
    m1.setAttribute('refX', '10'); m1.setAttribute('refY', '3.5'); m1.setAttribute('orient', 'auto');
    const p1 = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    p1.setAttribute('points', '0 0, 10 3.5, 0 7'); p1.setAttribute('fill', '#fff'); m1.appendChild(p1);
    defs.appendChild(m1);
    const m2 = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    m2.setAttribute('id', 'pm-run-ahd'); m2.setAttribute('markerWidth', '10'); m2.setAttribute('markerHeight', '7');
    m2.setAttribute('refX', '10'); m2.setAttribute('refY', '3.5'); m2.setAttribute('orient', 'auto');
    const p2 = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    p2.setAttribute('points', '0 0, 10 3.5, 0 7'); p2.setAttribute('fill', '#f1c40f'); m2.appendChild(p2);
    defs.appendChild(m2);
  }
  svg.appendChild(defs);

  const step = drill.steps[stepIdx];
  if (!step) return;
  step.objects.forEach(obj => {
    if (obj.type === 'player') {
      var pg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      createPlayerIcon(pg, obj.x, obj.y, obj.color || '#e94560', 36);
      svg.appendChild(pg);
      var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', obj.x); t.setAttribute('y', obj.y + 26);
      t.setAttribute('fill', '#fff'); t.setAttribute('font-size', '16'); t.setAttribute('font-weight', '700');
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-family', 'sans-serif');
      t.setAttribute('paint-order', 'stroke'); t.setAttribute('stroke', '#000'); t.setAttribute('stroke-width', '3');
      t.textContent = obj.label || '?'; svg.appendChild(t);
    } else if (obj.type === 'coach') {
      var pg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      createCoachIcon(pg, obj.x, obj.y, obj.color || '#222', 50);
      svg.appendChild(pg);
      var lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lbl.setAttribute('x', obj.x); lbl.setAttribute('y', obj.y + 34);
      lbl.setAttribute('fill', '#fff'); lbl.setAttribute('font-size', '16');
      lbl.setAttribute('font-weight', '700'); lbl.setAttribute('font-family', 'sans-serif');
      lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('paint-order', 'stroke');
      lbl.setAttribute('stroke', '#000'); lbl.setAttribute('stroke-width', '3');
      lbl.textContent = obj.label || 'Coach'; svg.appendChild(lbl);
    } else if (obj.type === 'cone') {
      const tri = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      tri.setAttribute('points', `${obj.x},${obj.y-18} ${obj.x-14},${obj.y+12} ${obj.x+14},${obj.y+12}`);
      tri.setAttribute('fill', '#f39c12'); tri.setAttribute('stroke', '#e67e22'); tri.setAttribute('stroke-width', '2');
      svg.appendChild(tri);
    } else if (obj.type === 'ball') {
      var pg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      createBallIcon(pg, obj.x, obj.y, 24);
      svg.appendChild(pg);
    } else if (obj.type === 'text') {
      var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', obj.x); t.setAttribute('y', obj.y);
      t.setAttribute('fill', obj.color || '#fff'); t.setAttribute('font-size', obj.fontSize || 20);
      t.setAttribute('font-weight', '600'); t.setAttribute('font-family', 'sans-serif');
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('paint-order', 'stroke');
      t.setAttribute('stroke', '#000'); t.setAttribute('stroke-width', '3');
      t.textContent = obj.text || ''; svg.appendChild(t);
    } else if (obj.type === 'arrow') {
      // Resolve anchors for run view
      var ax1 = obj.x1, ay1 = obj.y1, ax2 = obj.x2, ay2 = obj.y2;
      if (obj.anchor1) { var anc = step.objects.find(o => o.id === obj.anchor1); if (anc) { ax1 = anc.x; ay1 = anc.y; } }
      if (obj.anchor2) { var anc = step.objects.find(o => o.id === obj.anchor2); if (anc) { ax2 = anc.x; ay2 = anc.y; } }
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', ax1); line.setAttribute('y1', ay1);
      line.setAttribute('x2', ax2); line.setAttribute('y2', ay2);
      const isDash = obj.style === 'dashed';
      line.setAttribute('stroke', isDash ? '#f1c40f' : '#fff');
      line.setAttribute('stroke-width', 4);
      if (isDash) line.setAttribute('stroke-dasharray', '12,8');
      line.setAttribute('marker-end', isDash ? 'url(#pm-run-ahd)' : 'url(#pm-run-ah)');
      svg.appendChild(line);
    }
  });
}

function pmRunTimerToggle() {
  if (pmRunRunning) {
    clearInterval(pmRunTimer); pmRunRunning = false;
    document.getElementById('pm-run-start-btn').textContent = 'START';
  } else {
    pmRunRunning = true;
    document.getElementById('pm-run-start-btn').textContent = 'PAUSE';
    pmRunTimer = setInterval(() => {
      pmRunSeconds++;
      pmUpdateRunTimer();
    }, 1000);
  }
}

function pmRunTimerReset() {
  if (pmRunRunning) { clearInterval(pmRunTimer); pmRunRunning = false; }
  pmRunSeconds = 0;
  document.getElementById('pm-run-start-btn').textContent = 'START';
  pmUpdateRunTimer();
}

function pmUpdateRunTimer() {
  document.getElementById('pm-run-timer').textContent = formatTime(pmRunSeconds);
}

function pmRunNext() {
  const session = pmState.sessions[0];
  if (pmRunIdx + 1 < session.drills.length) {
    pmRunIdx++; pmRunStep = 0; pmRunTimerReset(); pmRenderRunView();
  }
}

// --- Export / Import Drills ---
function pmExportDrill() {
  if (!pmCurrentDrill) return;
  const data = JSON.stringify(pmCurrentDrill, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (pmCurrentDrill.name || 'drill').replace(/[^a-zA-Z0-9_\- ]/g, '') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function pmExportDrillById(id) {
  const drill = pmState.drills.find(d => d.id === id);
  if (!drill) return;
  const data = JSON.stringify(drill, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (drill.name || 'drill').replace(/[^a-zA-Z0-9_\- ]/g, '') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function pmImportDrill() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.multiple = true;
  input.onchange = (e) => {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const drill = JSON.parse(ev.target.result);
          if (!drill.steps || !Array.isArray(drill.steps)) { alert('Invalid drill file: ' + file.name); return; }
          drill.id = 'drill_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
          pmState.drills.push(drill);
          savePracticeState();
          pmRenderLibrary();
        } catch(err) { alert('Could not read drill file: ' + err.message); }
      };
      reader.readAsText(file);
    });
  };
  input.click();
}

appMode = 'home';
document.getElementById('home-screen').classList.remove('hidden');
document.getElementById('game-mode').classList.remove('active');
document.getElementById('practice-mode').classList.remove('active');
document.getElementById('nav-buttons').classList.add('visible');
document.getElementById('nav-close-btn').style.display = 'none';
render(); updateTimerDisplay();
